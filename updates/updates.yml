---
- name: Geoptimaliseerd Systeemonderhoud (Failsafe Editie)
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: 1. APT Pakketbeheer Opschonen & Updaten
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        autoclean: yes
        purge: yes
      register: apt_res
      until: apt_res is success
      retries: 3
      delay: 5

    - name: 2a. Check of de schijf TRIM ondersteunt (SSD check)
      ansible.builtin.shell: "cat /sys/block/$(lsblk -no pkname $(findmnt -nvo SOURCE /) | head -n1)/queue/rotational"
      register: is_ssd
      changed_when: false
      failed_when: false
      ignore_errors: yes

    - name: 2b. SSD Onderhoud (FSTRIM)
      # Alleen uitvoeren als de schijf niet-rotationeel is (0)
      ansible.builtin.shell: fstrim -av
      register: trim_result
      when: is_ssd.stdout | default('1') == "0"
      failed_when: false
      ignore_errors: yes

    - name: 3. Firmware check (fwupdmgr)
      ansible.builtin.command: fwupdmgr get-updates
      register: fw_check
      changed_when: false
      failed_when: false
      ignore_errors: yes

    - name: 4. Update initramfs
      ansible.builtin.command: update-initramfs -u
      changed_when: true
      failed_when: false
      ignore_errors: yes

    - name: 5. Systeem Status ophalen
      ansible.builtin.set_fact:
        disk_usage: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_total') | first | default(0) }}"
        disk_free: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first | default(0) }}"

    - name: 6. Haal CPU Temperatuur op
      # Gebruikt 'm 1' om bij de eerste match direct te stoppen
      ansible.builtin.shell: "sensors | grep -m 1 'Core 0' | awk '{print $3}' || echo 'N/A'"
      register: temp_status
      changed_when: false
      ignore_errors: yes

    - name: Eindrapportage
      ansible.builtin.debug:
        msg: 
          - "Onderhoud voltooid op: {{ ansible_hostname }}"
          - "Uptime: {{ (ansible_uptime_seconds | int // 3600) }} uur"
          - "SSD Gedetecteerd: {{ 'Ja' if is_ssd.stdout | default('1') == '0' else 'Nee/Onbekend' }}"
          - "Trim Resultaat: {{ trim_result.stdout | default('Overgeslagen') }}"
          - "Disk Gebruik: {{ ((1 - (disk_free|float / disk_usage|float)) * 100) | round(1) if disk_usage|float > 0 else 'N/A' }}%"
          - "CPU Temp: {{ temp_status.stdout | default('N/A') }}"
