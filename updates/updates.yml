---
- name: Geoptimaliseerd Systeemonderhoud (CLI & Server)
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: 1. APT Pakketbeheer Opschonen & Updaten
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        autoclean: yes
        purge: yes

    - name: 2. SSD Onderhoud (FSTRIM)
      # Gebruikt de officiële module om TRIM uit te voeren op ondersteunde mounts
      community.general.fstrim:
        mountpoint: /
      register: trim_result
      ignore_errors: yes

    - name: 3. Firmware check (fwupdmgr)
      # We gebruiken command omdat fwupdmgr geen native module heeft
      ansible.builtin.command: fwupdmgr get-updates
      register: fw_check
      changed_when: false
      failed_when: false

    - name: 4. Update initramfs
      # Cruciaal na kernel updates of microcode wijzigingen
      ansible.builtin.command: update-initramfs -u
      changed_when: true

    - name: 5. Systeem Status ophalen
      # We gebruiken ansible_facts in plaats van shell voor disk en uptime
      ansible.builtin.set_fact:
        disk_usage: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_total') | first | default(0) }}"
        disk_free: "{{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first | default(0) }}"

    - name: 6. Haal CPU Temperatuur op (Indien sensors aanwezig)
      ansible.builtin.shell: "sensors | grep 'Core 0' | awk '{print $3}' || echo 'N/A'"
      register: temp_status
      changed_when: false
      ignore_errors: yes

    - name: Eindrapportage
      ansible.builtin.debug:
        msg: 
          - "Onderhoud voltooid op: {{ ansible_hostname }}"
          - "Uptime: {{ ansible_uptime_seconds | int // 3600 }} uur"
          - "Disk Gebruik: {{ ((1 - (disk_free|float / disk_usage|float)) * 100) | round(1) }}%"
          - "CPU Temp: {{ temp_status.stdout }}"
