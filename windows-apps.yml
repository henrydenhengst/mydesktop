---
- name: Installeer Zakelijke Verbindings-tools (Citrix & RDP)
  hosts: localhost
  connection: local
  tasks:
    - name: Installeer Remmina (RDP Client)
      become: yes
      apt:
        name:
          - remmina
          - remmina-plugin-rdp
          - remmina-plugin-vnc
          - remmina-plugin-secret # Voor het onthouden van wachtwoorden
        state: present
        update_cache: yes

    - name: Download Citrix Workspace App (ICACLIENT)
      get_url:
        url: "https://downloads.citrix.com/21318/icaclient_24.2.0.65_amd64.deb" # Let op: check altijd de laatste versie op citrix.com
        dest: "/tmp/icaclient.deb"
        mode: '0644'
      ignore_errors: yes # Citrix links verlopen soms, handmatige download kan nodig zijn

    - name: Installeer Citrix Workspace met afhankelijkheden
      become: yes
      apt:
        deb: "/tmp/icaclient.deb"
        state: present
      when: ansible_check_mode == false

    - name: Fix voor SSL-certificaten in Citrix (Cruciaal voor Linux!)
      become: yes
      shell: |
        # Citrix op Linux vertrouwt standaard de systeemcertificaten niet. 
        # Deze link zorgt ervoor dat Citrix je Firefox/Debian certificaten gebruikt.
        ln -sf /usr/share/ca-certificates/mozilla/* /opt/Citrix/ICAClient/keystore/cacerts/
        /opt/Citrix/ICAClient/util/ctx_rehash
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Snelkoppelingen op het bureaublad voor Remote Work
      shell: |
        cp /usr/share/applications/org.remmina.Remmina.desktop /home/$USER/Desktop/Remote-Desktop.desktop
        # Citrix verschijnt meestal als 'selfservice' of 'Citrix Workspace'
        cp /usr/share/applications/selfservice.desktop /home/$USER/Desktop/Citrix.desktop || true
        chmod +x /home/$USER/Desktop/*.desktop
        chown $USER:$USER /home/$USER/Desktop/*.desktop
      args:
        executable: /bin/bash
