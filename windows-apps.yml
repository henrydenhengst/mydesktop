---
- name: Installeer Zakelijke Verbindings-tools (Citrix & RDP)
  hosts: localhost
  connection: local
  tasks:
    - name: Installeer Remmina (RDP Client)
      become: yes
      apt:
        name:
          - remmina
          - remmina-plugin-rdp
          - remmina-plugin-secret
        state: present
        update_cache: yes

    - name: Poging tot downloaden Citrix Workspace
      get_url:
        url: "https://downloads.citrix.com/21318/icaclient_24.2.0.65_amd64.deb"
        dest: "/tmp/icaclient.deb"
        mode: '0644'
        headers:
          User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
      register: citrix_download
      ignore_errors: yes

    - name: Installeer Citrix (alleen als download is gelukt)
      become: yes
      apt:
        deb: "/tmp/icaclient.deb"
        state: present
      when: not citrix_download.failed and ansible_check_mode == false
      ignore_errors: yes

    - name: Fix voor SSL-certificaten in Citrix
      become: yes
      shell: |
        if [ -d "/opt/Citrix/ICAClient/keystore/cacerts/" ]; then
          ln -sf /usr/share/ca-certificates/mozilla/* /opt/Citrix/ICAClient/keystore/cacerts/
          /opt/Citrix/ICAClient/util/ctx_rehash
        fi
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Snelkoppelingen op het bureaublad
      become: yes
      shell: |
        REAL_USER="{{ ansible_env.USER if ansible_env.USER != 'root' else ansible_user_id }}"
        DESKTOP_DIR="/home/$REAL_USER/Desktop"
        [ ! -d "$DESKTOP_DIR" ] && DESKTOP_DIR="/home/$REAL_USER/Bureaublad"
        
        mkdir -p "$DESKTOP_DIR"
        
        [ -f "/usr/share/applications/org.remmina.Remmina.desktop" ] && cp /usr/share/applications/org.remmina.Remmina.desktop "$DESKTOP_DIR/Remote-Desktop.desktop"
        [ -f "/usr/share/applications/selfservice.desktop" ] && cp /usr/share/applications/selfservice.desktop "$DESKTOP_DIR/Citrix.desktop"
        
        chown -R $REAL_USER:$REAL_USER "$DESKTOP_DIR"
        chmod +x "$DESKTOP_DIR"/*.desktop
      args:
        executable: /bin/bash
      ignore_errors: yes
