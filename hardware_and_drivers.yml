---
- name: Hardware, NTFS en Smartcard support
  hosts: localhost
  connection: local
  tasks:
    # --- 1. BESTANDSSYSTEEM (NTFS & EXFAT) ---
    - name: Installeer NTFS en exFAT ondersteuning
      become: yes
      apt:
        name:
          - ntfs-3g       # Lezen en schrijven op Windows schijven
          - exfat-fuse    # Voor moderne grote USB-sticks/SD-kaarten
          - exfatprogs
          - gparted       # Visueel schijfbeheer (Windows-stijl)
        state: present

    # --- 2. SMARTCARD (PC/SC) ---
    - name: Installeer Smartcard drivers en middleware
      become: yes
      apt:
        name:
          - pcscd         # De daemon die de kaartlezer aanstuurt
          - libpcsclite1
          - pcsc-tools
          - opensc        # Universele smartcard library
        state: present

    - name: Zorg dat de Smartcard service altijd draait
      become: yes
      systemd:
        name: pcscd
        state: started
        enabled: yes

    # --- 3. FIRMWARE & CPU MICROCODE ---
    - name: Voeg 'non-free' en 'contrib' toe voor ontbrekende firmware
      become: yes
      apt_repository:
        repo: "deb http://deb.debian.org/debian/ {{ ansible_distribution_release }} main contrib non-free non-free-firmware"
        state: present

    - name: Installeer universele firmware en CPU updates
      become: yes
      apt:
        name:
          - firmware-linux-free
          - firmware-linux-nonfree
          - bluetooth
          - bluez-firmware
          - firmware-realtek    # Vaak nodig voor stabiele Wi-Fi
        state: present
        update_cache: yes
      ignore_errors: yes

    - name: Installeer CPU microcode (Intel/AMD check)
      become: yes
      apt:
        name: "{{ 'intel-microcode' if ansible_processor[1] is search('Intel') else 'amd64-microcode' }}"
        state: present
      ignore_errors: yes

    # --- 4. WEBCAM & MULTIMEDIA ---
    - name: Installeer Cheese en v4l-utils voor webcam beheer
      become: yes
      apt:
        name:
          - cheese            # De 'Camera' app (zoals op Windows)
          - v4l-utils         # Video4Linux tools voor driver-check
          - guvcview          # Geavanceerde webcam instellingen
        state: present

    - name: Voeg gebruiker toe aan systeem-groepen
      become: yes
      user:
        name: "{{ ansible_env.USER if ansible_env.USER != 'root' else ansible_user_id }}"
        groups: video,lp,scanner,plugdev,bluetooth
        append: yes
