---
- name: Installeer en configureer AI Assistent (Copilot alternatief)
  hosts: localhost
  connection: local
  tasks:
    - name: Zorg dat Flatpak is geïnstalleerd
      become: yes
      apt:
        name: flatpak
        state: present

    - name: Voeg Flathub repository toe
      become: yes
      flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Installeer Bavarder via Flatpak
      become: yes
      flatpak:
        name: io.github.Bavarder.Bavarder
        state: present
        method: system

    - name: Snelkoppeling op het bureaublad maken
      become: yes
      shell: |
        REAL_USER="{{ ansible_env.USER if ansible_env.USER != 'root' else ansible_user_id }}"
        DESKTOP_DIR="/home/$REAL_USER/Desktop"
        [ ! -d "$DESKTOP_DIR" ] && DESKTOP_DIR="/home/$REAL_USER/Bureaublad"

        mkdir -p "$DESKTOP_DIR"

        LAUNCHER="/var/lib/flatpak/exports/share/applications/io.github.Bavarder.Bavarder.desktop"
        if [ -f "$LAUNCHER" ]; then
            cp "$LAUNCHER" "$DESKTOP_DIR/AI-Assistent.desktop"
            sed -i 's/^Name=.*/Name=AI Assistent (Copilot)/g' "$DESKTOP_DIR/AI-Assistent.desktop"
            chown $REAL_USER:$REAL_USER "$DESKTOP_DIR/AI-Assistent.desktop"
            chmod +x "$DESKTOP_DIR/AI-Assistent.desktop"
        fi
      args:
        executable: /bin/bash

    - name: Stel sneltoets Win+C in (Cinnamon specifiek)
      become: no
      shell: |
        gsettings set org.cinnamon.desktop.keybindings.custom-keybinding:/org/cinnamon/desktop/keybindings/custom-keybindings/custom0/ name 'AI Assistent'
        gsettings set org.cinnamon.desktop.keybindings.custom-keybinding:/org/cinnamon/desktop/keybindings/custom-keybindings/custom0/ command 'flatpak run io.github.Bavarder.Bavarder'
        gsettings set org.cinnamon.desktop.keybindings.custom-keybinding:/org/cinnamon/desktop/keybindings/custom-keybindings/custom0/ binding "['<Super>c']"
      ignore_errors: yes
