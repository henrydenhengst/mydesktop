---
- name: Debian 13 XFCE Nord Windows Setup (Stable)
  hosts: localhost
  connection: local
  become: yes

  vars:
    user_name: "{{ ansible_user_id }}"
    base_font_size: "13"
    mono_font_size: "14"
    firefox_zoom: "1.25"
    panel_size: "42"

  tasks:

    # =========================
    # SYSTEM PACKAGES
    # =========================
    - name: Installeer pakketten
      apt:
        name:
          - firefox-esr
          - libreoffice
          - libreoffice-gtk3
          - terminator
          - micro
          - git
          - unzip
          - wget
          - xfce4-whiskermenu-plugin
          - papirus-icon-theme
          - ttf-mscorefonts-installer
          - bluez
          - blueman
          - xfce4-systemload-plugin
          - xfce4-battery-plugin
        state: present
        update_cache: yes

    - name: Bluetooth service
      systemd:
        name: bluetooth
        state: started
        enabled: yes

    # =========================
    # THEMES (SAFE)
    # =========================
    - name: Clone Nordic theme
      git:
        repo: https://github.com/EliverLara/Nordic.git
        dest: /tmp/Nordic
        depth: 1

    - name: Install theme system-wide
      copy:
        src: /tmp/Nordic/
        dest: /usr/local/share/themes/Nordic
        remote_src: yes

    # =========================
    # FONTS (SAFE)
    # =========================
    - name: Download JetBrainsMono
      get_url:
        url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
        dest: /tmp/jb.zip

    - name: Unpack fonts
      unarchive:
        src: /tmp/jb.zip
        dest: /usr/local/share/fonts/
        remote_src: yes

    - name: Refresh font cache
      command: fc-cache -f

    # =========================
    # XFCE SETTINGS (SAFE SESSION HANDLING)
    # =========================
    - name: XFCE appearance settings
      become_user: "{{ user_name }}"
      shell: |
        xfconf-query -c xsettings -p /Net/ThemeName -s "Nordic" || true
        xfconf-query -c xsettings -p /Net/IconThemeName -s "Papirus-Dark" || true
        xfconf-query -c xfwm4 -p /general/theme -s "Nordic" || true
        xfconf-query -c xsettings -p /Gtk/FontName -s "Sans {{ base_font_size }}" || true
        xfconf-query -c xfwm4 -p /general/title_font -s "Sans Bold {{ base_font_size }}" || true
        xfconf-query -c xfwm4 -p /general/button_layout -s "O|HMC" || true

    - name: Restart XFCE panel safely
      become_user: "{{ user_name }}"
      shell: xfce4-panel -r || true

    # =========================
    # PANEL (LESS DESTRUCTIVE)
    # =========================
    - name: Configure panel size only (safe)
      become_user: "{{ user_name }}"
      shell: |
        xfconf-query -c xfce4-panel -p /panels/panel-1/size -s {{ panel_size }} || true

    # =========================
    # TERMINATOR
    # =========================
    - name: Terminator config
      become_user: "{{ user_name }}"
      copy:
        dest: ~/.config/terminator/config
        content: |
          [global_config]
            show_titlebar = False
          [profiles]
            [[default]]
              background_color = "#2e3440"
              foreground_color = "#d8dee9"
              cursor_color = "#d8dee9"
              font = JetBrainsMono Nerd Font {{ mono_font_size }}
              use_system_font = False

    # =========================
    # FIREFOX (IDEMPOTENT FIX)
    # =========================
    - name: Firefox DPI setting (safe)
      become_user: "{{ user_name }}"
      shell: |
        for d in ~/.mozilla/firefox/*.default*; do
          if [ -d "$d" ]; then
            grep -q devPixelsPerPx "$d/user.js" 2>/dev/null || \
            echo 'user_pref("layout.css.devPixelsPerPx", "{{ firefox_zoom }}");' >> "$d/user.js"
          fi
        done
      ignore_errors: yes