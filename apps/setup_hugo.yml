---
- name: Setup Hugo site via Centralized Config (Universal Edition)
  hosts: localhost
  connection: local

  tasks:
    - name: Download en installeer de juiste Hugo versie
      become: yes
      unarchive:
        src: "{{ hugo_binary_url }}"
        dest: "/usr/local/bin"
        remote_src: yes
        exclude: ["README.md", "LICENSE"]
      args:
        creates: "/usr/local/bin/hugo"

    - name: Initialiseer de mappenstructuur van het project
      command: "hugo new site {{ project_dir }}"
      args:
        creates: "{{ project_dir }}/hugo.toml"

    - name: Zorg dat de benodigde mappen bestaan
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "templates/themes"
        - "{{ project_dir }}/static"
        - "{{ project_dir }}/content/posts"
        - "{{ project_dir }}/data"

    - name: Installeer het gekozen thema via Git
      git:
        repo: "{{ current_theme_repo }}"
        dest: "{{ project_dir }}/themes/{{ current_theme_name }}"
        version: master
        depth: 1

    - name: Kopieer de standaard data van Universal naar het project
      command: "cp -rn {{ project_dir }}/themes/{{ current_theme_name }}/exampleSite/data/ {{ project_dir }}/data/"
      args:
        creates: "{{ project_dir }}/data/features"
      when: current_theme_name == "hugo-universal-theme"

    - name: Genereer de hugo.toml vanuit de thema-specifieke template
      template:
        src: "templates/themes/{{ current_theme_name }}.toml.j2"
        dest: "{{ project_dir }}/hugo.toml"
        mode: '0644'

    - name: Plaats het PHP mail script in de static map
      template:
        src: templates/mail.php.j2
        dest: "{{ project_dir }}/static/mail.php"
        mode: '0644'

    - name: Maak het eerste blogbericht aan
      command: "hugo new posts/{{ first_post_filename }}"
      args:
        chdir: "{{ project_dir }}"
      creates: "{{ project_dir }}/content/posts/{{ first_post_filename }}"

    - name: Statusoverzicht
      debug:
        msg: 
          - "--- INSTALLATIE VOLTOOID ---"
          - "Thema: {{ current_theme_name }}"
          - "Maker: {{ site_maker }}"
          - "Eigenaar: {{ site_owner }}"
          - "Project locatie: {{ project_dir }}"
          - "PHP Mailer: {{ project_dir }}/static/mail.php"
          - "Zet de server aan: cd {{ project_dir }} && hugo server -D"
