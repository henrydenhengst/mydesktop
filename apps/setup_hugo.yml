---
- name: Setup een Hugo site met variabel thema
  hosts: localhost
  connection: local
  vars:
    # --- Aanpasbare variabelen ---
    project_dir: "~/mijn_hugo_site"
    hugo_version: "0.124.1"
    
    # Verander deze twee om een ander thema te kiezen:
    current_theme_name: "papermod"
    current_theme_repo: "https://github.com/adityatelange/hugo-PaperMod.git"

  tasks:
    - name: Download Hugo Extended binary
      get_url:
        url: "https://github.com/gohugoio/hugo/releases/download/v{{ hugo_version }}/hugo_extended_{{ hugo_version }}_linux-amd64.tar.gz"
        dest: "/tmp/hugo.tar.gz"

    - name: Pak Hugo uit
      become: yes
      unarchive:
        src: "/tmp/hugo.tar.gz"
        dest: "/usr/local/bin"
        remote_src: yes

    - name: Initialiseer project map
      command: "hugo new site {{ project_dir }}"
      args:
        creates: "{{ project_dir }}/hugo.toml"

    - name: Installeer het gekozen thema
      git:
        repo: "{{ current_theme_repo }}"
        dest: "{{ project_dir }}/themes/{{ current_theme_name }}"
        version: master

    - name: Update de config met de thema variabele
      lineinfile:
        path: "{{ project_dir }}/hugo.toml"
        # Zoekt naar een regel die begint met 'theme =' en vervangt deze, 
        # of voegt hem toe als hij niet bestaat.
        regexp: '^theme\s*='
        line: 'theme = "{{ current_theme_name }}"'
        create: yes

    - name: Genereer eerste content
      command: "hugo new posts/eerste-bericht.md"
      args:
        chdir: "{{ project_dir }}"
      creates: "{{ project_dir }}/content/posts/eerste-bericht.md"
