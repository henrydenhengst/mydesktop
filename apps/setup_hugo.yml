---
- name: Setup Hugo site via group_vars
  hosts: localhost
  connection: local
  
  tasks:
    - name: Download en installeer Hugo
      become: yes
      unarchive:
        src: "{{ hugo_binary_url }}"
        dest: "/usr/local/bin"
        remote_src: yes
        exclude: ["README.md", "LICENSE"]

    - name: Maak Hugo project aan
      command: "hugo new site {{ project_dir }}"
      args:
        creates: "{{ project_dir }}/hugo.toml"

    - name: Installeer het thema
      git:
        repo: "{{ current_theme_repo }}"
        dest: "{{ project_dir }}/themes/{{ current_theme_name }}"
        version: master

    - name: Configureer hugo.toml
      lineinfile:
        path: "{{ project_dir }}/hugo.toml"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        create: yes
      loop:
        - { regexp: '^theme\s*=', line: 'theme = "{{ current_theme_name }}"' }
        - { regexp: '^title\s*=', line: 'title = "{{ site_title }}"' }

    - name: Maak eerste bericht aan
      command: "hugo new posts/{{ first_post_filename }}"
      args:
        chdir: "{{ project_dir }}"
      creates: "{{ project_dir }}/content/posts/{{ first_post_filename }}"
