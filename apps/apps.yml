---
- name: Setup Ultieme DevOps Toolkit inclusief Firewall
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Update apt cache en installeer alle pakketten
      ansible.builtin.apt:
        update_cache: yes
        state: present
        cache_valid_time: 3600
        name:
          # --- ESSENTIALS ---
          - ansible
          - git
          - ssh
          - ufw

          # --- SYSTEEM & MONITORING ---
          - htop
          - btop
          - atop
          - glances
          - nmon
          - iotop
          - powertop
          - lsof
          - strace
          - lm-sensors
          
          # --- NAVIGATIE & FILES ---
          - ranger
          - nnn
          - mc
          - ncdu
          - tree
          - fzf
          - duf
          
          # --- NETWERK & DIAGNOSE ---
          - nmap
          - iperf3
          - mtr-tiny
          - tcpdump
          - tshark
          - bmon
          - speedtest-cli
          - dnsutils
          - socat
          - netcat-openbsd
          - ethtool
          - ipcalc
          
          # --- DATA & TEXT PROCESSING ---
          - vim
          - neovim
          - bat
          - jq
          - ripgrep
          - fd-find
          - diffutils
          
          # --- CONTAINERS & CLOUD ---
          - podman
          - rclone
          - skopeo
          - buildah
          
          # --- HARDWARE & SYSTEEM TOOLS ---
          - smartmontools
          - inxi
          - pciutils
          - usbutils
          - tmux
          - rsync
          - curl
          - wget
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: SSH poort 22 openzetten in UFW
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: UFW inschakelen en basisbeleid instellen (Deny incoming)
      community.general.ufw:
        state: enabled
        direction: incoming
        policy: deny

    - name: Zorg dat SSH-service draait
      ansible.builtin.systemd:
        name: ssh
        state: started
        enabled: yes

    - name: Configureer Aliassen voor moderne tools
      ansible.builtin.file:
        src: "/usr/bin/{{ item.src }}"
        dest: "/usr/local/bin/{{ item.dest }}"
        state: link
        force: yes
      loop:
        - { src: 'batcat', dest: 'bat' }
        - { src: 'fdfind', dest: 'fd' }
      ignore_errors: yes

    - name: Controleer Avahi (mDNS)
      ansible.builtin.systemd:
        name: avahi-daemon
        state: started
        enabled: yes
