---
- name: post-install void
  hosts: localhost
  become: yes
  vars:
    # REPO UNLOCK
    repo_packages:
      - void-repo-nonfree

    # DESKTOP & DRIVERS
    core_packages:
      - lxqt
      - lightdm
      - lightdm-gtk-greeter
      - firefox
      - libreoffice
      - xorg-minimal
      - dbus
      - elogind
      - nvidia           # Swap to 'intel-ucode' if on Intel
      - pipewire
      - wireplumber

    # YOUR SPECIFIED TOOLKIT (Verified for XBPS 2026)
    tech_toolkit:
      - ansible
      - git
      - openssh          # Provides sshd
      - ufw
      - htop
      - btop
      - atop
      - glances
      - nmon
      - iotop
      - powertop
      - lsof
      - strace
      - lm_sensors       # Name used in XBPS
      - ranger
      - nnn
      - mc
      - ncdu
      - tree
      - fzf
      - duf
      - nmap
      - iperf3
      - mtr              # Standard TUI package
      - tcpdump
      - wireshark-cli    # Provides 'tshark'
      - bmon
      - speedtest-cli
      - bind-utils       # Provides dig, nslookup (dnsutils equivalent)
      - socat
      - netcat-openbsd
      - ethtool
      - ipcalc
      - vim
      - neovim
      - bat
      - jq
      - ripgrep
      - fd               # Note: just 'fd' in Void, not 'fd-find'
      - diffutils
      - smartmontools
      - inxi
      - pciutils
      - usbutils
      - tmux
      - rsync
      - curl
      - wget

  tasks:
    - name: Step 1 - Unlock Non-Free Repository
      command: "xbps-install -Sy {{ item }}"
      loop: "{{ repo_packages }}"
      changed_when: false

    - name: Step 2 - Sync and Install Massive Toolkit
      command: "xbps-install -Sy {{ item }}"
      loop: "{{ core_packages + tech_toolkit }}"
      register: pkg_install
      changed_when: "'installed successfully' in pkg_install.stdout"

    - name: Step 3 - Enable Runit Services
      file:
        src: "/etc/sv/{{ item }}"
        dest: "/var/service/{{ item }}"
        state: link
      loop:
        - dbus
        - lightdm
        - sshd
        - ufw

    - name: Step 4 - Firewall "Port 22 Only" Enforcement
      shell: |
        ufw default deny incoming
        ufw default allow outgoing
        ufw allow 22/tcp
        ufw --force enable
      changed_when: false

    - name: Step 5 - PipeWire & LightDM Privacy Config
      block:
        - name: Set PipeWire to Autostart in LXQt
          file:
            src: "/usr/share/applications/pipewire.desktop"
            dest: "/etc/xdg/autostart/pipewire.desktop"
            state: link
        - name: Bypass LightDM Identity Hooks
          lineinfile:
            path: /etc/lightdm/lightdm.conf
            regexp: '^#?greeter-hide-users='
            line: 'greeter-hide-users=false'

    - name: Step 6 - The Final "Push Back" Purge
      command: "xbps-remove -Fy systemd-userdb"
      ignore_errors: yes
