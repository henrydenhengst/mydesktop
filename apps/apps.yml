---
- name: post install void
  hosts: localhost
  become: yes
  vars:
    # 1. Unlock non-free for drivers/microcode
    repo_packages:
      - void-repo-nonfree

    # 2. Desktop Environment & Modern Audio Stack
    core_packages:
      - lxqt
      - lightdm
      - lightdm-gtk-greeter
      - firefox
      - libreoffice
      - xorg-minimal
      - dbus
      - elogind
      - nvidia           # Change to 'intel-ucode' for Intel CPUs
      - pipewire
      - wireplumber
      - alsa-pipewire
      - libjack-pipewire

    # 3. Your Specified 2026 Technician Toolkit
    tech_toolkit:
      - ansible
      - git
      - openssh
      - ufw
      - htop
      - btop
      - atop
      - glances
      - nmon
      - iotop
      - powertop
      - lsof
      - strace
      - lm_sensors
      - ranger
      - nnn
      - mc
      - ncdu
      - tree
      - fzf
      - duf
      - nmap
      - iperf3
      - mtr
      - tcpdump
      - wireshark-cli
      - bmon
      - speedtest-cli
      - bind-utils
      - socat
      - netcat-openbsd
      - ethtool
      - ipcalc
      - vim
      - neovim
      - bat
      - jq
      - ripgrep
      - fd
      - diffutils
      - smartmontools
      - inxi
      - pciutils
      - usbutils
      - tmux
      - rsync
      - curl
      - wget
      - util-linux       # Required for zramctl
      - zstd             # Fast, high-ratio compression for zRam

  tasks:
    - name: Step 1 - Unlock Repositories
      command: "xbps-install -Sy {{ item }}"
      loop: "{{ repo_packages }}"
      changed_when: false

    - name: Step 2 - Sync and Install Everything
      command: "xbps-install -Sy {{ item }}"
      loop: "{{ core_packages + tech_toolkit }}"
      register: pkg_install
      changed_when: "'installed successfully' in pkg_install.stdout"

    - name: Step 3 - Dynamic zRam Optimization
      block:
        - name: Create Dynamic zRam Script
          copy:
            dest: /usr/local/bin/void-zram-setup
            mode: '0755'
            content: |
              #!/bin/sh
              # Calculate 50% of total RAM for compressed swap
              total_mem=$(free -b | grep Mem: | awk '{print $2}')
              zram_size=$((total_mem / 2))
              modprobe zram
              zramctl --find --size $zram_size --algorithm zstd
              mkswap /dev/zram0
              swapon /dev/zram0 -p 100
        - name: Create zRam Runit Service
          shell: |
            mkdir -p /etc/sv/zram
            echo -e "#!/bin/sh\nexec /usr/local/bin/void-zram-setup" > /etc/sv/zram/run
            chmod +x /etc/sv/zram/run
          changed_when: false
        - name: Set Kernel Swappiness
          sysctl:
            name: vm.swappiness
            value: '10'
            state: present

    - name: Step 4 - Enable Runit Services
      file:
        src: "/etc/sv/{{ item }}"
        dest: "/var/service/{{ item }}"
        state: link
      loop:
        - dbus
        - lightdm
        - sshd
        - ufw
        - zram

    - name: Step 5 - Security & Privacy Configuration
      block:
        - name: Firewall Port 22 Only
          shell: |
            ufw default deny incoming
            ufw default allow outgoing
            ufw allow 22/tcp
            ufw --force enable
          changed_when: false
        - name: PipeWire LXQt Autostart
          file:
            src: "/usr/share/applications/pipewire.desktop"
            dest: "/etc/xdg/autostart/pipewire.desktop"
            state: link
        - name: LightDM Stealth Mode
          lineinfile:
            path: /etc/lightdm/lightdm.conf
            regexp: '^#?greeter-hide-users='
            line: 'greeter-hide-users=false'

    - name: Step 6 - The Final Purge
      command: "xbps-remove -Fy systemd-userdb"
      ignore_errors: yes
