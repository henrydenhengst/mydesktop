- name: Installeer de Ultieme DevOps 50 Toolkit
  become: yes
  apt:
    update_cache: yes
    state: present
    name:
      # --- SYSTEEM & MONITORING ---
      - htop
      - btop
      - atop
      - glances
      - nmon
      - iotop
      - powertop
      - lsof
      - strace
      - lm-sensors
      
      # --- NAVIGATIE & FILES ---
      - ranger
      - nnn
      - mc
      - ncdu
      - tree
      - fzf
      - duf
      
      # --- NETWERK & DIAGNOSE ---
      - nmap
      - iperf3
      - mtr-tiny
      - tcpdump
      - tshark
      - bmon
      - speedtest-cli
      - dnsutils
      - socat
      - netcat-openbsd
      - ethtool
      - ipcalc
      
      # --- DATA & TEXT PROCESSING ---
      - vim
      - neovim
      - batcat
      - jq
      - ripgrep
      - fdfind
      - diffutils
      
      # --- CONTAINERS & CLOUD ---
      - podman
      - rclone
      - skopeo
      - buildah
      - ansible
      - git
      
      # --- HARDWARE & SYSTEEM TOOLS ---
      - smartmontools
      - inxi
      - pciutils
      - usbutils
      - tmux
      - rsync
      - curl
      - wget

- name: Configureer Aliassen voor moderne tools
  become: yes
  file:
    src: "/usr/bin/{{ item.src }}"
    dest: "/usr/local/bin/{{ item.dest }}"
    state: link
  loop:
    - { src: 'batcat', dest: 'bat' }
    - { src: 'fdfind', dest: 'fd' }
