- name: Configureer Shell Aliassen en FZF Integratie
  hosts: localhost
  connection: local
  become: no  # Dit moet in de user-context, niet als root
  tasks:
    - name: Voeg Aliassen en FZF toe aan .bashrc
      blockinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED DEVOPS BLOCK"
        block: |
          # --- FZF INTEGRATIE ---
          # Snel zoeken in history en bestanden (CTRL+R en CTRL+T)
          [ -f /usr/share/doc/fzf/examples/key-bindings.bash ] && source /usr/share/doc/fzf/examples/key-bindings.bash
          [ -f /usr/share/doc/fzf/examples/completion.bash ] && source /usr/share/doc/fzf/examples/completion.bash

          # --- DEVOPS ALIASSEN ---
          # Navigatie & Files
          alias ..='cd ..'
          alias ...='cd ../..'
          alias l='lsd -F --group-dirs first'  # Als je lsd hebt, anders 'ls -CF'
          alias ll='ls -alhF'
          alias bat='batcat'
          alias fd='fdfind'
          alias tree='tree -C'
          alias ncdu='ncdu --color dark'

          # Systeem & Netwerk
          alias top='btop'
          alias ip='ip -c'             # Kleur in je IP output
          alias ports='netstat -tulanp'
          alias myip='curl ifconfig.me'
          alias df='duf'               # Gebruik de moderne schijfviewer

          # Git & Ansible
          alias gs='git status'
          alias gp='git pull'
          alias adone='ansible-playbook'
          alias a-hosts='cat /etc/ansible/hosts'

          # Hardware Checks (Laptops)
          alias temp='sensors | grep "Core 0"'
          alias battery='upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep percentage'

    - name: Zorg dat de bash_completion geactiveerd is
      lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: "[[ -f /usr/share/bash-completion/bash_completion ]] && . /usr/share/bash-completion/bash_completion"
        state: present
