---
# ==============================================================================
# CENTRALE CONFIGURATIE: Universal Theme Edition
# ==============================================================================

# Systeem & Installatie
hugo_version: "0.124.1"
hugo_binary_url: "https://github.com/gohugoio/hugo/releases/download/v{{ hugo_version }}/hugo_extended_{{ hugo_version }}_linux-amd64.tar.gz"
project_dir: "~/mijn_hugo_site"

# Rollen & Identiteit
site_owner: "Naam van de Eigenaar"
site_owner_email: "eigenaar@domein.nl"
site_maker: "Henry den Hengst"

# Site Metadata
site_title: "Mijn Universele Business Site"
base_url: "https://www.jouwdomein.nl"
language_code: "nl-nl"

# Licentie & Rechten (De Henry-verdeling)
content_copyright: "© {{ site_owner }}. Alle teksten en afbeeldingen zijn auteursrechtelijk beschermd."
tech_license_text: "De website-structuur en code zijn vrij te gebruiken onder de Copyleft-voorwaarden."
license_type: "Copyleft"

# Thema & Design (Nu Universal!)
current_theme_name: "hugo-universal-theme"
current_theme_repo: "https://github.com/devcows/hugo-universal-theme.git"

# Specifieke Universal Parameters
# Deze variabelen worden in de nieuwe hugo.toml.j2 gebruikt
universal_settings:
  style: "default"                  # Keuze uit: default, blue, green, pink, purple, red, sea, violet
  address: |
    Straatnaam 123
    2011 AA Haarlem
    Nederland
  phone: "+31 23 123 4567"
  latitude: "52.3874"               # Voor Google Maps (optioneel)
  longitude: "4.6462"
  enable_google_maps: false

# Homepage Sectie Schakelaars (Zwart-wit: true of false)
features_enabled: true
testimonials_enabled: true
clients_enabled: true
recent_posts_enabled: true

# Formulier & Privacy
contact_endpoint: "/mail.php"
privacy_vermelding: "Uw gegevens worden verwerkt volgens het privacybeleid van de eigenaar."

# Navigatie Menu
main_menu:
  - { name: "Home", url: "/", weight: 1 }
  - { name: "Blog", url: "/blog", weight: 2 }
  - { name: "Contact", url: "/contact", weight: 3 }

# Social Media & Footer
social_links:
  - { platform: "github", url: "https://github.com/henrydenhengst" }
  - { platform: "facebook", url: "https://www.facebook.com/share/g/1CRuMqw1Wn/" }

footer_text: "{{ content_copyright }} | {{ tech_license_text }} | Gerealiseerd door {{ site_maker }}"

# Content Instellingen
first_post_filename: "welkom.md"
