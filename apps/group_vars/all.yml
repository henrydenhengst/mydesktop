---
# ==============================================================================
# CENTRALE CONFIGURATIE (Ansible > Hugo > PHP)
# ==============================================================================

# Systeem & Installatie
hugo_version: "0.124.1"
hugo_binary_url: "https://github.com/gohugoio/hugo/releases/download/v{{ hugo_version }}/hugo_extended_{{ hugo_version }}_linux-amd64.tar.gz"
project_dir: "~/mijn_hugo_site"

# Rollen & Identiteit (Maker vs. Eigenaar)
site_owner: "Naam van de Eigenaar"       # Persoon/bedrijf van wie de site is
site_owner_email: "eigenaar@domein.nl"   # Ontvanger van de contactformulieren
site_maker: "Henry den Hengst"           # De technisch bouwer (Jij)

# Site Metadata
site_title: "Mijn Ansible Hugo Site"
base_url: "https://www.jouwdomein.nl"
language_code: "nl-nl"

# Licentie & Copyleft
license_type: "Copyleft"
license_text: "Vrij om te delen en aan te passen onder dezelfde voorwaarden."
license_url: "https://creativecommons.org/licenses/by-sa/4.0/"

# Thema & Design
current_theme_name: "papermod"
current_theme_repo: "https://github.com/adityatelange/hugo-PaperMod.git"
theme_params:
  description: "Website ontwikkeld door Henry den Hengst via Ansible"
  show_share_buttons: true
  show_reading_time: true

# Formulier & Privacy
contact_endpoint: "/mail.php"
privacy_vermelding: "Uw gegevens worden verwerkt volgens het privacybeleid van de eigenaar."

# Navigatie Menu
main_menu:
  - { name: "Home", url: "/", weight: 1 }
  - { name: "Archief", url: "/archives", weight: 2 }
  - { name: "Tags", url: "/tags", weight: 3 }
  - { name: "Over mij", url: "/about", weight: 4 }
  - { name: "Contact", url: "/contact", weight: 5 }

# Social Media & Footer (Jouw kanalen als maker)
social_links:
  - { platform: "github", url: "https://github.com/henrydenhengst" }
  - { platform: "facebook", url: "https://www.facebook.com/share/g/1CRuMqw1Wn/" }

footer_text: "Technisch gerealiseerd door {{ site_maker }} met Ansible"

# Content Instellingen
first_post_filename: "eerste-bericht.md"
