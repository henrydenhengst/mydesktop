---
- name: Installeer populaire Open Source Windows-tools
  hosts: localhost
  connection: local
  tasks:
    - name: Installeer lokale klassiekers via APT
      become: yes
      apt:
        name:
          - vlc
          - gimp
          - keepassxc
          - p7zip-full
          - gnome-disk-utility
          - nemo-fileroller
        state: present
        update_cache: yes

    - name: Bureaublad snelkoppelingen voor tools
      become: yes
      shell: |
        REAL_USER="{{ ansible_env.USER if ansible_env.USER != 'root' else ansible_user_id }}"
        DESKTOP_DIR="/home/$REAL_USER/Desktop"
        [ ! -d "$DESKTOP_DIR" ] && DESKTOP_DIR="/home/$REAL_USER/Bureaublad"

        mkdir -p "$DESKTOP_DIR"

        # Lijst van apps om te kopiëren
        APPS=("vlc.desktop" "gimp.desktop" "org.keepassxc.KeePassXC.desktop")
        
        for app in "${APPS[@]}"; do
            if [ -f "/usr/share/applications/$app" ]; then
                cp "/usr/share/applications/$app" "$DESKTOP_DIR/"
            fi
        done

        # Hernoem KeePassXC naar iets herkenbaars
        [ -f "$DESKTOP_DIR/org.keepassxc.KeePassXC.desktop" ] && mv "$DESKTOP_DIR/org.keepassxc.KeePassXC.desktop" "$DESKTOP_DIR/Wachtwoorden.desktop"

        chown -R $REAL_USER:$REAL_USER "$DESKTOP_DIR"
        chmod +x "$DESKTOP_DIR"/*.desktop
      args:
        executable: /bin/bash
