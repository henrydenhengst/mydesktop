---
- name: Volledig Systeemonderhoud en Updates
  hosts: localhost
  connection: local
  tasks:
    - name: Update de APT pakketlijst
      become: yes
      apt:
        update_cache: yes

    - name: Voer een volledige systeem-upgrade uit (APT)
      become: yes
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Update alle Flatpak applicaties (Edge, Brave, OnlyOffice)
      become: yes
      shell: flatpak update -y
      args:
        executable: /bin/bash

    - name: Controleer op firmware updates (fwupdmgr)
      become: yes
      shell: fwupdmgr get-updates || true
      ignore_errors: yes

    - name: Update de desktop database (Icoon verversing)
      become: yes
      shell: update-desktop-database /usr/share/applications || true
      args:
        executable: /bin/bash

    - name: Toon systeem-uptime en status
      shell: uptime
      register: uptime_status

    - name: Statusverslag
      debug:
        msg: "Systeem is volledig up-to-date. {{ uptime_status.stdout }}"
