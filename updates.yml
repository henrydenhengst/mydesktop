---
- name: Volledig onzichtbare automatische updates
  hosts: localhost
  connection: local
  tasks:
    - name: Installeer unattended-upgrades
      become: yes
      apt:
        name: 
          - unattended-upgrades
          - apt-listchanges
        state: present

    - name: Configureer unattended-upgrades voor alle bronnen
      become: yes
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Origins-Pattern {
                  "origin=Debian,codename=${distro_codename},label=Debian";
                  "origin=Debian,codename=${distro_codename},label=Debian-Security";
                  "origin=Debian,codename=${distro_codename}-security,label=Debian-Security";
                  "origin=Debian,codename=${distro_codename}-updates";
          };
          Unattended-Upgrade::Package-Blacklist { };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::InstallOnShutdown "false";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";

    - name: Activeer automatische APT updates
      become: yes
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";

    - name: Maak een Systemd timer voor automatische Flatpak updates
      become: yes
      copy:
        dest: /etc/systemd/system/flatpak-auto-update.service
        content: |
          [Unit]
          Description=Update alle Flatpaks onzichtbaar
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/flatpak update -y

          [Install]
          WantedBy=multi-user.target

    - name: Plan de Flatpak update timer (elke 4 uur)
      become: yes
      copy:
        dest: /etc/systemd/system/flatpak-auto-update.timer
        content: |
          [Unit]
          Description=Run Flatpak update elke 4 uur

          [Timer]
          OnBootSec=10min
          OnUnitActiveSec=4h

          [Install]
          WantedBy=timers.target

    - name: Start en activeer Flatpak timer
      become: yes
      systemd:
        name: flatpak-auto-update.timer
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Verberg Cinnamon Update Manager meldingen
      shell: |
        # Zorg dat de visuele update-notifier niet opduikt in de taakbalk
        gsettings set org.cinnamon.updates startup-delay-seconds 999999
        gsettings set org.cinnamon.updates check-interval-steps 999999
      args:
        executable: /bin/bash
