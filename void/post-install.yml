---
- name: post install void
  hosts: localhost
  become: yes
  gather_facts: yes
  
  tasks:
    # --- 1. HARDWARE SCAN ---
    - name: Detectie van CPU en GPU types
      set_fact:
        is_nvidia: "{{ 'nvidia' in (ansible_facts['proc_cmdline'] | string | lower) or 'NVIDIA' in (ansible_facts['devices'] | string) }}"
        is_intel: "{{ 'Intel' in ansible_facts['processor'][0] }}"
        zram_size_mb: "{{ (ansible_facts['memtotal_mb'] * 0.6) | round | int if ansible_facts['memtotal_mb'] < 4096 else 4096 }}"

    # --- 2. DE "SILENT BOOT" & KERNEL TWEAKS ---
    - name: GRUB configureren voor stilte en performance
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet splash loglevel=3 rd.udev.log_priority=3 vt.global_cursor_default=0 zswap.enabled=0"'
      register: grub_config

    - name: Update GRUB
      command: update-grub
      when: grub_config.changed

    # --- 3. DE PURE INSTALLATIE (XBPS) ---
    - name: Installatie van de volledige stack (Firmware, Desktop, Tools)
      shell: |
        xbps-install -Sy void-repo-nonfree
        xbps-install -Sy \
        lxqt lightdm lightdm-gtk-greeter xorg-minimal dbus elogind \
        pipewire wireplumber alsa-pipewire libjack-pipewire \
        linux-firmware sof-firmware tlp thermald \
        {{ 'nvidia' if is_nvidia else 'mesa-dri' }} {{ 'intel-ucode' if is_intel else 'linux-firmware-amd' }} \
        firefox libreoffice ansible git openssh ufw htop btop atop glances nmon iotop powertop lsof strace lm_sensors \
        ranger nnn mc ncdu tree fzf duf nmap iperf3 mtr tcpdump wireshark-cli bmon speedtest-cli \
        bind-utils socat netcat-openbsd ethtool ipcalc vim neovim bat jq ripgrep fd diffutils \
        smartmontools inxi pciutils usbutils tmux rsync curl wget util-linux zstd ntfs-3g exfat pcsc-lite
      changed_when: false

    # --- 4. DE DYNAMISCHE ZRAM MOTOR ---
    - name: Configureer zRam script en service
      block:
        - name: Create zRam Setup Script
          copy:
            dest: /usr/local/bin/void-zram-setup
            mode: '0755'
            content: |
              #!/bin/sh
              modprobe zram
              zramctl --find --size {{ zram_size_mb }}M --algorithm zstd
              mkswap /dev/zram0
              swapon /dev/zram0 -p 100
        - name: Create zRam Runit Service
          shell: |
            mkdir -p /etc/sv/zram
            echo -e "#!/bin/sh\nexec /usr/local/bin/void-zram-setup" > /etc/sv/zram/run
            chmod +x /etc/sv/zram/run
          changed_when: false

    # --- 5. RUNIT SERVICES ACTIVATIE ---
    - name: Activeer essentiële hardware & systeem services
      file:
        src: "/etc/sv/{{ item }}"
        dest: "/var/service/{{ item }}"
        state: link
      loop: [dbus, lightdm, sshd, ufw, zram, tlp, thermald]
      ignore_errors: yes

    # --- 6. HARDENING & USER CONFIG ---
    - name: Systeem beveiliging en SSH hardening
      block:
        - name: UFW op Port 22
          shell: "ufw default deny incoming && ufw allow 22/tcp && ufw --force enable"
        - name: SSH ForwardAgent voor cssh
          lineinfile: { path: /etc/ssh/ssh_config, regexp: '^#?ForwardAgent', line: '    ForwardAgent yes' }
        - name: Gebruiker rechten voor hardware
          user:
            name: "{{ ansible_user_id }}"
            groups: video,lp,scanner,bluetooth,audio,input
            append: yes
        - name: Genereer SSH Key
          command: "ssh-keygen -t ed25519 -N '' -f /home/{{ ansible_user_id }}/.ssh/id_ed25519"
          args: { creates: "/home/{{ ansible_user_id }}/.ssh/id_ed25519" }
          become: no

    # --- 7. DE FINALE SCHOONMAAK ---
    - name: Verwijder systemd overblijfselen
      shell: "xbps-remove -Fy systemd-userdb && touch /tmp/fortress_ready"
      ignore_errors: yes
