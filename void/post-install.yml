---
- name: post install void (Repair Café Edition)
  hosts: localhost
  become: yes
  gather_facts: yes
  
  vars:
    real_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

  tasks:
    # --- 1. ROBUUSTE HARDWARE SCAN ---
    - name: Ensure pciutils aanwezig (voor betrouwbare GPU detectie)
      community.general.xbps:
        name: pciutils
        state: present

    - name: Detect NVIDIA GPU
      command: lspci
      register: lspci_output
      changed_when: false

    - name: Stel hardware facts in
      set_fact:
        is_nvidia: "{{ 'NVIDIA' in lspci_output.stdout }}"
        is_intel: "{{ ansible_facts['processor_vendor'] == 'GenuineIntel' }}"
        zram_size_mb: "{{ (ansible_facts['memtotal_mb'] * 0.6) | round | int if ansible_facts['memtotal_mb'] < 8192 else 4096 }}"

    # --- 2. XBPS BOOTSTRAP (Idempotent & veilig) ---
    - name: Update XBPS en certificaten
      command: xbps-install -Syu -y
      register: xbps_update
      changed_when: "'updating' in xbps_update.stdout"

    # --- 3. GRUB TWEAKS (Zonder overschrijven bestaande flags) ---
    - name: Voeg kernel flags toe aan GRUB
      replace:
        path: /etc/default/grub
        regexp: 'GRUB_CMDLINE_LINUX_DEFAULT="(.*)"'
        replace: 'GRUB_CMDLINE_LINUX_DEFAULT="\1 zswap.enabled=0 quiet splash loglevel=3 rd.udev.log_priority=3 vt.global_cursor_default=0"'
      register: grub_config

    - name: Update GRUB
      command: update-grub
      when: grub_config.changed

    # --- 4. INSTALLATIE (Non-interactief) ---
    - name: Voeg non-free repository toe
      community.general.xbps:
        name: void-repo-nonfree
        update_cache: yes

    - name: Installatie van de volledige stack
      community.general.xbps:
        upgrade: yes
        extra_args: -y -f 
        name:
          - lxqt
          - lightdm
          - lightdm-gtk-greeter
          - xorg-minimal
          - dbus
          - elogind
          - pipewire
          - wireplumber
          - alsa-pipewire
          - libjack-pipewire
          - linux-firmware
          - sof-firmware
          - tlp
          - thermald
          - firefox
          - libreoffice
          - git
          - ansible
          - openssh
          - ufw
          - htop
          - btop
          - bat
          - jq
          - ripgrep
          - fd
          - usbutils
          - curl
          - wget
          - "{{ 'nvidia' if is_nvidia else 'mesa-dri' }}"
          - "{{ 'intel-ucode' if is_intel else 'linux-firmware-amd' }}"
        state: present

    # --- 5. DYNAMISCHE ZRAM (Robuuste Bash-check) ---
    - name: Create zRam Setup Script
      copy:
        dest: /usr/local/bin/void-zram-setup
        mode: '0755'
        content: |
          #!/bin/sh
          modprobe zram
          if ! swapon --show | grep -q zram0; then
            # Check of we hot_add nodig hebben
            [ -e /sys/class/zram-control/hot_add ] && echo 1 > /sys/class/zram-control/hot_add
            zramctl /dev/zram0 --size {{ zram_size_mb }}M --algorithm zstd
            mkswap /dev/zram0
            swapon /dev/zram0 -p 100
          fi
    
    - name: Create zRam Runit Service
      block:
        - name: Zram sv directory
          file: { path: /etc/sv/zram, state: directory }
        - name: Zram run script
          copy:
            dest: /etc/sv/zram/run
            mode: '0755'
            content: |
              #!/bin/sh
              /usr/local/bin/void-zram-setup
              exec pause

    # --- 6. RUNIT SERVICES ACTIVATIE (Met stat check) ---
    - name: Activeer services (indien aanwezig)
      block:
        - name: Check of service bestaat
          stat:
            path: "/etc/sv/{{ item }}"
          register: svc
          loop: [dbus, lightdm, sshd, ufw, zram, tlp, thermald]

        - name: Activeer service via symlink
          file:
            src: "/etc/sv/{{ item.item }}"
            dest: "/var/service/{{ item.item }}"
            state: link
          when: item.stat.exists
          loop: "{{ svc.results }}"

    # --- 7. HARDENING & USER CONFIG (Met .ssh fix) ---
    - name: UFW Basis Configuratie
      command: "{{ item }}"
      loop:
        - "ufw default deny incoming"
        - "ufw allow 22/tcp"
        - "ufw --force enable"
      changed_when: false

    - name: Gebruiker toevoegen aan hardware groepen
      user:
        name: "{{ real_user }}"
        groups: video,lp,scanner,bluetooth,audio,input,wheel
        append: yes
      when: real_user != 'root'

    - name: Zorg dat .ssh bestaat
      file:
        path: "/home/{{ real_user }}/.ssh"
        state: directory
        owner: "{{ real_user }}"
        group: "{{ real_user }}"
        mode: '0700'
      when: real_user != 'root'

    - name: Genereer SSH Key voor gebruiker
      become: yes
      become_user: "{{ real_user }}"
      command: "ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_ed25519"
      args: { creates: "~/.ssh/id_ed25519" }
      when: real_user != 'root'

    # --- 8. KERNEL REFRESH (De veilige 'all' methode) ---
    - name: Reconfigureer alle pakketten en kernels
      command: xbps-reconfigure -fa
      changed_when: false
