---
- name: post install void (Repair Café Final Architect)
  hosts: localhost
  become: yes
  gather_facts: yes
  
  vars:
    real_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
    wanted_grub_flags:
      - zswap.enabled=0
      - quiet
      - splash
      - loglevel=3
      - rd.udev.log_priority=3
      - vt.global_cursor_default=0

  handlers:
    - name: update grub
      command: update-grub

  tasks:
    # --- 1. OMGEVINGS SCAN ---
    - name: Get user home directory via getent
      getent:
        database: passwd
        key: "{{ real_user }}"

    - name: Set user facts
      set_fact:
        user_home: "{{ getent_passwd[real_user][5] }}" # Correcte index voor home
        zram_size_mb: "{{ (ansible_facts['memtotal_mb'] * 0.6) | round | int if ansible_facts['memtotal_mb'] < 8192 else 4096 }}"

    - name: Ensure pciutils aanwezig (vóór detectie)
      community.general.xbps:
        name: pciutils
        state: present

    - name: Detect GPU
      command: lspci
      register: lspci_output
      changed_when: false

    - name: Stel GPU fact in
      set_fact:
        is_nvidia: "{{ lspci_output.stdout is search('VGA.*NVIDIA') }}"

    # --- 2. GRUB: IDEMPOTENT & VEILIG ---
    - name: Check of GRUB config bestaat
      stat:
        path: /etc/default/grub
      register: grub_stat

    - name: Lees huidige GRUB config
      slurp:
        path: /etc/default/grub
      register: grub_file
      when: grub_stat.stat.exists

    - name: Extraheer huidige GRUB flags (zonder character-grab bug)
      set_fact:
        current_flags: >-
          {{
            (
              (grub_file.content | b64decode)
              | regex_search('GRUB_CMDLINE_LINUX_DEFAULT="(.*)"', '\1')
              | default('')
            ).split()
          }}
      when: grub_stat.stat.exists

    - name: Schrijf GRUB config (merge flags)
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="{{ (current_flags + wanted_grub_flags) | unique | join(" ") }}"'
      register: grub_config
      when: grub_stat.stat.exists
      notify: update grub

    # --- 3. SYSTEM UPGRADE ---
    - name: Systeem synchroniseren en upgraden
      community.general.xbps:
        update_cache: yes
        upgrade: yes
      register: xbps_upgrade

    # --- 4. SOFTWARE INSTALLATIE ---
    - name: Voeg non-free repository toe
      community.general.xbps:
        name: void-repo-nonfree
        update_cache: yes

    - name: Installatie software stack (zonder dubbele upgrade)
      community.general.xbps:
        upgrade: no
        extra_args: -y -f 
        name:
          - lxqt
          - lightdm
          - lightdm-gtk-greeter
          - xorg-minimal
          - dbus
          - elogind
          - pipewire
          - wireplumber
          - alsa-pipewire
          - libjack-pipewire
          - linux-firmware
          - sof-firmware
          - tlp
          - thermald
          - firefox
          - libreoffice
          - htop
          - btop
          - bat
          - usbutils
          - curl
          - wget
          - "{{ 'nvidia' if is_nvidia else 'mesa-dri' }}"
          - "{{ 'intel-ucode' if ansible_facts['processor_vendor'] == 'GenuineIntel' else 'linux-firmware-amd' }}"
        state: present

    # --- 5. ZRAM: ROBUUSTE MULTI-DEVICE CLEANUP ---
    - name: Create zRam Setup Script
      copy:
        dest: /usr/local/bin/void-zram-setup
        mode: '0755'
        content: |
          #!/bin/sh
          modprobe zram
          
          # Reset ALLE bestaande zram devices om vervuiling te voorkomen
          for dev in /dev/zram*; do
            [ -b "$dev" ] || continue
            swapoff "$dev" 2>/dev/null || true
            zramctl --reset "$dev" 2>/dev/null || true
          done
          
          # Forceer aanmaak van device 0
          echo 1 > /sys/class/zram-control/hot_add 2>/dev/null || true
          
          zramctl /dev/zram0 --size {{ zram_size_mb }}M --algorithm zstd
          mkswap /dev/zram0
          swapon /dev/zram0 -p 100
    
    - name: Create zRam Runit Service
      block:
        - name: Zram sv directory
          file: { path: /etc/sv/zram, state: directory }
        - name: Zram run script
          copy:
            dest: /etc/sv/zram/run
            mode: '0755'
            content: |
              #!/bin/sh
              /usr/local/bin/void-zram-setup
              exec pause

    # --- 6. RUNIT SERVICES ---
    - name: Check of services bestaan
      stat:
        path: "/etc/sv/{{ item }}"
      register: svc_results
      loop: [dbus, lightdm, sshd, ufw, zram, tlp, thermald]

    - name: Activeer services
      file:
        src: "/etc/sv/{{ item.item }}"
        dest: "/var/service/{{ item.item }}"
        state: link
        force: no
      when: item.stat.exists
      loop: "{{ svc_results.results }}"

    # --- 7. UFW & USER CONFIG ---
    - name: UFW setup (native)
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: UFW allow SSH
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Gebruiker groepen
      user:
        name: "{{ real_user }}"
        groups: video,lp,scanner,bluetooth,audio,input,wheel
        append: yes
      when: real_user != 'root'

    - name: Zorg dat .ssh bestaat
      file:
        path: "{{ user_home }}/.ssh"
        state: directory
        owner: "{{ real_user }}"
        mode: '0700'
      when: real_user != 'root'

    - name: Genereer SSH Key
      become: yes
      become_user: "{{ real_user }}"
      command: "ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_ed25519"
      args: { creates: "{{ user_home }}/.ssh/id_ed25519" }
      when: real_user != 'root'

    # --- 8. KERNEL REFRESH ---
    - name: Reconfigureer kernels
      command: xbps-reconfigure -f linux
      when: (grub_config is defined and grub_config.changed) or (xbps_upgrade is defined and xbps_upgrade.changed)
