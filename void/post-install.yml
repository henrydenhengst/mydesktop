---
- name: post install void
  hosts: localhost
  become: yes
  gather_facts: yes
  
  tasks:
    # --- 1. VERBETERDE HARDWARE SCAN ---
    - name: Detectie van GPU (via lspci)
      shell: "lspci | grep -qi nvidia"
      register: nvidia_check
      ignore_errors: yes
      changed_when: false

    - name: Stel hardware facts in
      set_fact:
        is_nvidia: "{{ nvidia_check.rc == 0 }}"
        is_intel: "{{ 'Intel' in ansible_facts['processor'][0] }}"
        zram_size_mb: "{{ (ansible_facts['memtotal_mb'] * 0.6) | round | int if ansible_facts['memtotal_mb'] < 8192 else 4096 }}"

    # --- 2. XBPS BOOTSTRAP (Cruciaal voor ISO 2025) ---
    - name: Update XBPS en certificaten
      shell: |
        xbps-install -Sy ca-certificates
        xbps-install -uy xbps
      changed_when: false

    # --- 3. DE "SILENT BOOT" & KERNEL TWEAKS ---
    - name: GRUB configureren
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet splash loglevel=3 rd.udev.log_priority=3 vt.global_cursor_default=0 zswap.enabled=0"'
      register: grub_config

    - name: Update GRUB
      command: update-grub
      when: grub_config.changed

    # --- 4. DE INSTALLATIE (Nu 100% non-interactief) ---
    - name: Voeg non-free repository toe
      community.general.xbps:
        name: void-repo-nonfree
        update_cache: yes

    - name: Installatie van de volledige stack
      community.general.xbps:
        upgrade: yes
        # De vlaggen hieronder zorgen dat xbps niet stopt voor configuratie-vragen
        extra_args: -y -f 
        name:
          - lxqt
          - lightdm
          - lightdm-gtk-greeter
          - xorg-minimal
          - dbus
          - elogind
          - pipewire
          - wireplumber
          - alsa-pipewire
          - libjack-pipewire
          - linux-firmware
          - sof-firmware
          - tlp
          - thermald
          - firefox
          - libreoffice
          - git
          - ansible
          - openssh
          - ufw
          - htop
          - btop
          - bat
          - jq
          - ripgrep
          - fd
          - pciutils
          - usbutils
          - curl
          - wget
          - "{{ 'nvidia' if is_nvidia else 'mesa-dri' }}"
          - "{{ 'intel-ucode' if is_intel else 'linux-firmware-amd' }}"
        state: present

    # --- 5. DE DYNAMISCHE ZRAM MOTOR ---
    - name: Create zRam Setup Script
      copy:
        dest: /usr/local/bin/void-zram-setup
        mode: '0755'
        content: |
          #!/bin/sh
          modprobe zram
          if ! zramctl /dev/zram0 >/dev/null 2>&1; then
            zramctl --find --size {{ zram_size_mb }}M --algorithm zstd
            mkswap /dev/zram0
            swapon /dev/zram0 -p 100
          fi
    
    - name: Create zRam Runit Service
      block:
        - name: Zram sv directory
          file: { path: /etc/sv/zram, state: directory }
        - name: Zram run script
          copy:
            dest: /etc/sv/zram/run
            mode: '0755'
            content: |
              #!/bin/sh
              /usr/local/bin/void-zram-setup
              exec pause

    # --- 6. RUNIT SERVICES ACTIVATIE ---
    - name: Activeer services
      file:
        src: "/etc/sv/{{ item }}"
        dest: "/var/service/{{ item }}"
        state: link
      loop: [dbus, lightdm, sshd, ufw, zram, tlp, thermald]
      ignore_errors: yes

    # --- 7. HARDENING & USER CONFIG ---
    - name: UFW Basis Configuratie
      shell: |
        ufw default deny incoming
        ufw allow 22/tcp
        ufw --force enable
      changed_when: false

    - name: Gebruiker toevoegen aan hardware groepen
      user:
        name: "{{ ansible_env.USER if ansible_env.USER != 'root' else '$USER' }}"
        groups: video,lp,scanner,bluetooth,audio,input,wheel
        append: yes

    - name: Genereer SSH Key
      command: "ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_ed25519"
      args: { creates: "~/.ssh/id_ed25519" }
      become: no

    # --- 8. MICROCODE & KERNEL REFRESH ---
    - name: Reconfigureer kernel
      command: xbps-reconfigure -f linux{{ ansible_facts['kernel'] | regex_replace('\\..*', '') }}
      changed_when: false
