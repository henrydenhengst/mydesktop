---
- name: Build My Systemd-Free Home (Pure 64-bit)
  hosts: localhost
  become: yes
  vars:
    # 1. Unlock the non-free gate only
    repo_packages:
      - void-repo-nonfree

    # 2. Your core toolkit + Hardware drivers
    packages:
      - lxqt
      - lightdm
      - lightdm-gtk-greeter
      - firefox
      - libreoffice
      - ansible
      - xorg-minimal
      - dbus
      - elogind
      # Driver Selection (Swap based on your hardware)
      - nvidia           # Proprietary Nvidia
      - intel-ucode      # CPU stability for Intel
      - mesa-dri         # Open source graphics acceleration

  tasks:
    - name: Unlock the Non-Free Repository
      command: "xbps-install -Sy {{ item }}"
      loop: "{{ repo_packages }}"
      register: repo_result
      changed_when: "'installed successfully' in repo_result.stdout"

    - name: Full System Sync
      command: xbps-install -S

    - name: Install Tools and Drivers
      command: "xbps-install -Sy {{ item }}"
      loop: "{{ packages }}"
      register: pkg_install
      changed_when: "'installed successfully' in pkg_install.stdout"

    - name: Enable Runit Services (The Symlink Method)
      file:
        src: "/etc/sv/{{ item }}"
        dest: "/var/service/{{ item }}"
        state: link
      loop:
        - dbus
        - lightdm

    - name: Configure LightDM (Bypass identity-tracking timeout)
      lineinfile:
        path: /etc/lightdm/lightdm.conf
        regexp: '^#?greeter-hide-users='
        line: 'greeter-hide-users=false'
        state: present

    - name: Ensure Anonymity - Purge potential systemd hooks
      command: "xbps-remove -Fy systemd-userdb"
      ignore_errors: yes
