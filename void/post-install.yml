---
- name: Build My Systemd-Free Hardened Home
  hosts: localhost
  become: yes
  vars:
    repo_packages:
      - void-repo-nonfree

    packages:
      - lxqt
      - lightdm
      - lightdm-gtk-greeter
      - firefox
      - libreoffice
      - ansible
      - xorg-minimal
      - dbus
      - elogind
      # Drivers
      - nvidia
      - intel-ucode
      # Networking & Security
      - openssh
      - ufw
      # Audio (The 2026 standard)
      - pipewire
      - wireplumber
      - alsa-pipewire
      - libjack-pipewire

  tasks:
    - name: Unlock Non-Free Repo
      command: "xbps-install -Sy {{ item }}"
      loop: "{{ repo_packages }}"
      register: repo_result
      changed_when: "'installed successfully' in repo_result.stdout"

    - name: Install All Tools, Drivers, and Services
      command: "xbps-install -Sy {{ item }}"
      loop: "{{ packages }}"
      register: pkg_install
      changed_when: "'installed successfully' in pkg_install.stdout"

    - name: Enable Core Runit Services
      file:
        src: "/etc/sv/{{ item }}"
        dest: "/var/service/{{ item }}"
        state: link
      loop:
        - dbus
        - lightdm
        - sshd
        - ufw

    - name: Configure UFW (Allow SSH 22/tcp Only)
      shell: |
        ufw default deny incoming
        ufw default allow outgoing
        ufw allow 22/tcp
        ufw --force enable
      changed_when: false

    - name: Enable PipeWire for all Users (LXQt Autostart)
      file:
        src: "/usr/share/applications/pipewire.desktop"
        dest: "/etc/xdg/autostart/pipewire.desktop"
        state: link

    - name: Configure LightDM Privacy Patch
      lineinfile:
        path: /etc/lightdm/lightdm.conf
        regexp: '^#?greeter-hide-users='
        line: 'greeter-hide-users=false'

    - name: Purge identity-tracking hooks
      command: "xbps-remove -Fy systemd-userdb"
      ignore_errors: yes
