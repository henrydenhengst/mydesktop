---
- name: Debian LXQt Windows 11 Extreme Setup
  hosts: localhost
  connection: local
  become: yes

  vars:
    ublock_id: "uBlock0@raymondhill.net"

  tasks:

    - name: Voeg repositories toe
      apt_repository:
        repo: "deb http://deb.debian.org/debian/ {{ ansible_distribution_release }} main contrib non-free non-free-firmware"
        state: present

    - name: Installeer pakketten
      apt:
        name:
          - lxqt
          - lxqt-panel
          - lxqt-config
          - pcmanfm-qt
          - qterminal
          - firefox-esr
          - lxappearance
          - qt5ct
          - kvantum
          - kvantum-qt5
          - papirus-icon-theme
          - breeze-cursor-theme
          - ttf-mscorefonts-installer
          - numlockx
          - picom
          - rofi
          - feh
          - micro
          - flameshot
          - git
          - unzip
          - wget
        state: present
        update_cache: yes

    - name: Accepteer Microsoft fonts EULA
      debconf:
        name: ttf-mscorefonts-installer
        question: msttcorefonts/accepted-mscorefonts-eula
        value: 'true'
        vtype: select

    - name: Installeer JetBrains Mono Nerd Font
      unarchive:
        src: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
        dest: /usr/local/share/fonts
        remote_src: yes

    - name: Nordic GTK theme
      git:
        repo: https://github.com/EliverLara/Nordic.git
        dest: /usr/share/themes/Nordic
        depth: 1

    - name: Windows 11 icon theme
      git:
        repo: https://github.com/yeyushengfan258/Win11-icon-theme.git
        dest: /usr/share/icons/Win11
        depth: 1

    - name: Firefox uBlock Origin
      file:
        path: "/usr/lib/firefox-esr/distribution/extensions"
        state: directory

    - name: Download uBlock Origin
      get_url:
        url: https://addons.mozilla.org/firefox/downloads/latest/ublock-origin/addon-607454-latest.xpi
        dest: "/usr/lib/firefox-esr/distribution/extensions/{{ ublock_id }}.xpi"

    - name: Gebruikersconfiguratie
      become: no
      block:

        - name: Maak config directories
          file:
            path: "{{ item }}"
            state: directory
          loop:
            - "~/.config/lxqt"
            - "~/.config/qt5ct"
            - "~/.config/Kvantum"
            - "~/.config/picom"
            - "~/.config/rofi"
            - "~/.config/autostart"
            - "~/.config/gtk-3.0"
            - "~/.local/bin"
            - "~/Pictures"

        - name: Force Qt theming
          copy:
            dest: "~/.profile"
            content: |
              export QT_QPA_PLATFORMTHEME=qt5ct

        - name: GTK instellingen
          copy:
            dest: "~/.config/gtk-3.0/settings.ini"
            content: |
              [Settings]
              gtk-theme-name=Nordic
              gtk-icon-theme-name=Win11
              gtk-font-name=Segoe UI 10
              gtk-cursor-theme-name=Breeze

        - name: qt5ct config
          copy:
            dest: "~/.config/qt5ct/qt5ct.conf"
            content: |
              [Appearance]
              icon_theme=Win11
              style=kvantum

        - name: Kvantum config
          copy:
            dest: "~/.config/Kvantum/kvantum.kvconfig"
            content: |
              [General]
              theme=Nordic

        - name: Picom config (blur/transparency)
          copy:
            dest: "~/.config/picom/picom.conf"
            content: |
              backend = "glx";
              blur-method = "dual_kawase";
              blur-strength = 7;
              corner-radius = 10;

              opacity-rule = [
                "85:class_g = 'lxqt-panel'"
              ];

        - name: Autostart Picom
          copy:
            dest: "~/.config/autostart/picom.desktop"
            content: |
              [Desktop Entry]
              Type=Application
              Exec=picom --config ~/.config/picom/picom.conf
              Name=Picom

        - name: Rofi config (startmenu)
          copy:
            dest: "~/.config/rofi/config.rasi"
            content: |
              configuration {
                modi: "drun";
                show-icons: true;
                font: "Segoe UI 12";
              }

              window {
                width: 600;
                location: center;
              }

              listview {
                lines: 10;
              }

        - name: Startmenu script
          copy:
            dest: "~/.local/bin/startmenu"
            mode: '0755'
            content: |
              #!/bin/bash
              rofi -show drun

        - name: Windows key binding
          copy:
            dest: "~/.config/lxqt/globalkeyshortcuts.conf"
            content: |
              [startmenu]
              Command=~/.local/bin/startmenu
              Shortcut=Meta

        - name: LXQt panel (centered Windows 11 look)
          copy:
            dest: "~/.config/lxqt/panel.conf"
            content: |
              [General]
              iconTheme=Win11

              [panel1]
              position=Bottom
              size=46
              alignment=Center

              [panel1/plugins]
              1=spacer
              2=quicklaunch
              3=taskbar
              4=spacer
              5=tray
              6=clock

              [panel1/plugin1]
              type=spacer
              expanding=true

              [panel1/plugin4]
              type=spacer
              expanding=true

        - name: Download Windows 11 wallpaper
          get_url:
            url: https://wallpapercave.com/wp/wp7488372.jpg
            dest: "~/Pictures/windows11.jpg"

        - name: Wallpaper autostart
          copy:
            dest: "~/.config/autostart/wallpaper.desktop"
            content: |
              [Desktop Entry]
              Type=Application
              Exec=feh --bg-fill ~/Pictures/windows11.jpg
              Name=Wallpaper

        - name: Flameshot autostart
          copy:
            dest: "~/.config/autostart/flameshot.desktop"
            content: |
              [Desktop Entry]
              Type=Application
              Exec=flameshot

        - name: Numlock bij opstart
          copy:
            dest: "~/.config/autostart/numlock.desktop"
            content: |
              [Desktop Entry]
              Type=Application
              Exec=numlockx on