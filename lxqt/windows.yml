---
- name: Debian 13 LXQt Windows 10 lightweight setup
  hosts: all
  become: yes

  vars:
    target_user: "{{ ansible_user }}"
    user_home: "/home/{{ target_user }}"

    packages:
      # Core desktop (light)
      - lxqt
      - lxqt-panel
      - lxqt-session
      - lxqt-config
      - pcmanfm-qt
      - qterminal
      - openbox

      # Windows-like UX layer (light tools only)
      - rofi
      - picom
      - dunst
      - xdotool

      # Network / audio
      - network-manager
      - network-manager-gnome
      - pulseaudio
      - pavucontrol
      - pulseaudio-module-bluetooth
      - blueman
      - bluez

      # Fonts (no heavy font stacks)
      - fonts-noto
      - fonts-liberation
      - fontconfig

      # Utilities
      - curl
      - wget
      - git

      # Apps (keep minimal)
      - firefox-esr
      - libreoffice
      - libreoffice-l10n-nl
      - terminator

  tasks:

  # =========================
  # SYSTEM BASE
  # =========================
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install packages
    apt:
      name: "{{ packages }}"
      state: present
      install_recommends: no   # 🔥 belangrijk: minder bloat

  # =========================
  # DIRECTORIES
  # =========================
  - name: Create user config directories
    file:
      path: "{{ item }}"
      state: directory
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0755"
    loop:
      - "{{ user_home }}/.config/lxqt"
      - "{{ user_home }}/.config/openbox"
      - "{{ user_home }}/.config/rofi"
      - "{{ user_home }}/.config/picom"
      - "{{ user_home }}/.config/dunst"
      - "{{ user_home }}/.config/lxqt/autostart"
      - "{{ user_home }}/.local/bin"

  # =========================
  # LXQT PANEL (Windows style taskbar)
  # =========================
  - name: LXQt panel config (Windows-like)
    copy:
      dest: "{{ user_home }}/.config/lxqt/panel.conf"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0644"
      content: |
        [General]
        theme=

        [panel]
        position=Bottom
        size=36
        alignment=Left

        plugins=mainmenu, taskbar, tray, clock

        [taskbar]
        grouping=true
        show_only_current_desktop=false

  # =========================
  # ROFI (Windows Start Menu)
  # =========================
  - name: Rofi start menu config
    copy:
      dest: "{{ user_home }}/.config/rofi/config.rasi"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0644"
      content: |
        configuration {
          show-icons: true;
          drun-display-format: "{name}";
        }

        window {
          width: 38%;
        }

  - name: Start menu script (Super key)
    copy:
      dest: "{{ user_home }}/.local/bin/startmenu.sh"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0755"
      content: |
        #!/bin/bash
        rofi -show drun

  # =========================
  # OPENBOX (stable + no duplicates)
  # =========================
  - name: Openbox config (single source of truth)
    copy:
      dest: "{{ user_home }}/.config/openbox/rc.xml"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0644"
      content: |
        <?xml version="1.0" encoding="UTF-8"?>
        <openbox_config xmlns="http://openbox.org/3.4/rc">

          <keyboard>
            <keybind key="W">
              <action name="Execute">
                <command>{{ user_home }}/.local/bin/startmenu.sh</command>
              </action>
            </keybind>
          </keyboard>

          <focus>
            <followMouse>no</followMouse>
          </focus>

          <mouse>
            <dragThreshold>3</dragThreshold>
          </mouse>

          <applications>
            <application class="*">
              <decor>yes</decor>
            </application>
          </applications>

        </openbox_config>

  # =========================
  # PICOM (minimal Windows feel)
  # =========================
  - name: Picom config (light shadows only)
    copy:
      dest: "{{ user_home }}/.config/picom/picom.conf"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0644"
      content: |
        backend = "xrender";
        shadow = true;
        shadow-radius = 6;
        shadow-opacity = 0.25;
        fading = true;
        inactive-opacity = 0.95;
        blur-method = "none";   # 🔥 no blur = faster

  # =========================
  # DUNST (Windows-like notifications)
  # =========================
  - name: Dunst notification style
    copy:
      dest: "{{ user_home }}/.config/dunst/dunstrc"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0644"
      content: |
        [global]
        font = Noto Sans 10
        frame_color = "#0078D7"
        separator_height = 2

  # =========================
  # AUTOSTART (clean, minimal)
  # =========================
  - name: Autostart picom
    copy:
      dest: "{{ user_home }}/.config/lxqt/autostart/picom.desktop"
      content: |
        [Desktop Entry]
        Type=Application
        Name=Picom
        Exec=picom
        OnlyShowIn=LXQt
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0755"

  - name: Autostart network
    copy:
      dest: "{{ user_home }}/.config/lxqt/autostart/nm-applet.desktop"
      content: |
        [Desktop Entry]
        Type=Application
        Name=Network
        Exec=nm-applet
        OnlyShowIn=LXQt
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0755"

  - name: Autostart bluetooth
    copy:
      dest: "{{ user_home }}/.config/lxqt/autostart/blueman.desktop"
      content: |
        [Desktop Entry]
        Type=Application
        Name=Bluetooth
        Exec=blueman-applet
        OnlyShowIn=LXQt
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0755"

  # =========================
  # SERVICES (minimal overhead)
  # =========================
  - name: Enable NetworkManager
    systemd:
      name: NetworkManager
      enabled: yes
      state: started

  - name: Enable Bluetooth
    systemd:
      name: bluetooth
      enabled: yes
      state: started

  - name: Add bluetooth permissions
    user:
      name: "{{ target_user }}"
      groups: bluetooth
      append: yes

  # =========================
  # FIREFOX (UI scaling only)
  # =========================
  - name: Firefox UI scaling
    file:
      path: /usr/lib/firefox/distribution
      state: directory

  - name: Firefox DPI config
    copy:
      dest: /usr/lib/firefox/distribution/policies.json
      content: |
        {
          "policies": {
            "Preferences": {
              "layout.css.devPixelsPerPx": 1.25
            }
          }
        }