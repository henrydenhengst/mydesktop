---
- name: Debian 13 LXQt light desktop voor oudere computers
  hosts: all
  become: yes

  vars:
    target_user: "{{ ansible_user }}"
    user_home: "/home/{{ target_user }}"

    required_packages:
      # LXQt desktop
      - lxqt
      - lxqt-core
      - lxqt-config
      - lxqt-panel
      - lxqt-session
      - lxqt-runner
      - pcmanfm-qt
      - qterminal
      - openbox
      - obconf-qt

      # Apps
      - firefox-esr
      - libreoffice
      - libreoffice-l10n-nl
      - libreoffice-help-nl
      - terminator

      # Audio / Bluetooth
      - bluez
      - blueman
      - pulseaudio
      - pulseaudio-module-bluetooth
      - pavucontrol

      # Network
      - network-manager
      - network-manager-gnome
      - wpasupplicant
      - wireless-tools

      # Fonts & tools
      - fonts-dejavu
      - fonts-liberation
      - fonts-noto
      - fontconfig
      - git
      - curl
      - wget
      - unzip
      - zip

      # Performance
      - zram-tools
      - cpupower

  tasks:

  # =========================
  # 1. SYSTEM UPDATE
  # =========================
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install required packages
    apt:
      name: "{{ required_packages }}"
      state: present

  # =========================
  # 2. DIRECTORIES
  # =========================
  - name: Create user config directories
    file:
      path: "{{ item }}"
      state: directory
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0755"
    loop:
      - "{{ user_home }}/.config/terminator"
      - "{{ user_home }}/.config/lxqt"
      - "{{ user_home }}/.config/lxqt/autostart"
      - "{{ user_home }}/.config/openbox"
      - "{{ user_home }}/.local/share/lxqt/themes"
      - "{{ user_home }}/.local/share/icons"

  # =========================
  # 3. NERD FONTS (SAFE)
  # =========================
  - name: Check Nerd Fonts installed
    stat:
      path: /usr/local/share/fonts/.nerd-fonts-installed
    register: nerd_fonts

  - name: Clone Nerd Fonts repo
    git:
      repo: https://github.com/ryanoasis/nerd-fonts
      dest: /tmp/nerd-fonts
      depth: 1
    when: not nerd_fonts.stat.exists

  - name: Install Nerd Fonts
    shell: ./install.sh {{ item }}
    args:
      chdir: /tmp/nerd-fonts
    loop:
      - Hack
      - FiraCode
      - JetBrainsMono
    when: not nerd_fonts.stat.exists

  - name: Update font cache
    command: fc-cache -fv
    when: not nerd_fonts.stat.exists

  - name: Mark Nerd Fonts installed
    file:
      path: /usr/local/share/fonts/.nerd-fonts-installed
      state: touch
    when: not nerd_fonts.stat.exists

  # =========================
  # 4. TERMINATOR
  # =========================
  - name: Configure Terminator
    copy:
      dest: "{{ user_home }}/.config/terminator/config"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0644"
      content: |
        [global_config]
        focus = system

        [profiles]
        [[default]]
        use_system_font = False
        font = Hack Nerd Font 14
        background_color = #1a1a2e
        foreground_color = #ffffff

  # =========================
  # 5. LXQT CONFIG
  # =========================
  - name: LXQt config
    copy:
      dest: "{{ user_home }}/.config/lxqt/lxqt.conf"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0644"
      content: |
        [General]
        theme=Clearlooks
        icon_theme=Papirus
        font=Noto Sans,12

  # =========================
  # 6. OPENBOX BASIC CONFIG
  # =========================
  - name: Openbox config
    copy:
      dest: "{{ user_home }}/.config/openbox/rc.xml"
      owner: "{{ target_user }}"
      group: "{{ target_user }}"
      mode: "0644"
      content: |
        <?xml version="1.0" encoding="UTF-8"?>
        <openbox_config>
          <theme>
            <name>Clearlooks</name>
          </theme>
        </openbox_config>

  # =========================
  # 7. PERFORMANCE
  # =========================
  - name: Enable ZRAM
    systemd:
      name: zramswap
      enabled: yes
      state: started
    ignore_errors: yes

  - name: Set CPU governor
    command: cpupower frequency-set -g powersave
    ignore_errors: yes

  # =========================
  # 8. NETWORK
  # =========================
  - name: Enable NetworkManager
    systemd:
      name: NetworkManager
      enabled: yes
      state: started

  # =========================
  # 9. BLUETOOTH
  # =========================
  - name: Enable Bluetooth
    systemd:
      name: bluetooth
      enabled: yes
      state: started

  - name: Add user to bluetooth group
    user:
      name: "{{ target_user }}"
      groups: bluetooth
      append: yes

  # =========================
  # 10. FIREFOX UI SCALING
  # =========================
  - name: Firefox config dir
    file:
      path: /usr/lib/firefox/distribution
      state: directory

  - name: Firefox policies
    copy:
      dest: /usr/lib/firefox/distribution/policies.json
      mode: "0644"
      content: |
        {
          "policies": {
            "Preferences": {
              "layout.css.devPixelsPerPx": 1.25
            }
          }
        }

  # =========================
  # CLEANUP
  # =========================
  - name: Cleanup temp files
    file:
      path: /tmp/nerd-fonts
      state: absent

  handlers:
    - name: restart bluetooth
      systemd:
        name: bluetooth
        state: restarted

    - name: restart NetworkManager
      systemd:
        name: NetworkManager
        state: restarted