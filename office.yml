---
- name: Software migratie naar Microsoft-achtige omgeving
  hosts: localhost
  connection: local
  tasks:
    - name: Hardhandig verwijderen van alle LibreOffice resten
      become: yes
      apt:
        name:
          - libreoffice-common
          - libreoffice-core
          - libreoffice-gnome
          - libreoffice-gtk3
          - libreoffice-calc
          - libreoffice-writer
          - libreoffice-style-colibre
        state: absent
        purge: yes

    - name: Installeer Flatpak ondersteuning
      become: yes
      apt:
        name: 
          - flatpak
          - gnome-software-plugin-flatpak
        state: present

    - name: Voeg Flathub toe
      become: yes
      flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Installeer OnlyOffice (via Flatpak)
      become: yes
      flatpak:
        name: org.onlyoffice.desktopeditors
        state: present
        remote: flathub
        method: system

    - name: Forceer icoon verversing
      become: yes
      shell: |
        # Alleen het moderne commando gebruiken, update-menus weglaten
        update-desktop-database /usr/share/applications || true
      args:
        executable: /bin/bash

    - name: Check of OnlyOffice is geïnstalleerd
      shell: flatpak list | grep OnlyOffice
      register: onlyoffice_check
      changed_when: false
      ignore_errors: yes

    - name: Toon status van OnlyOffice
      debug:
        msg: "OnlyOffice status: {{ onlyoffice_check.stdout }}"
      when: onlyoffice_check.rc == 0
