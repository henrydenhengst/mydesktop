---
- name: Enterprise rTorrent Deployment - v1.0.0 Stable
  hosts: localhost
  connection: local
  become_method: sudo
  vars:
    user_home: "{{ lookup('env', 'HOME') }}"
    user_id: "{{ lookup('env', 'USER') }}"
    base_dir: "{{ user_home }}/rtorrent"
    watch_dir: "{{ user_home }}/rtorrent/watch"
    download_dir: "{{ user_home }}/rtorrent/downloading"

  tasks:
    - name: Stat huidige .rtorrent.rc voor backup
      stat:
        path: "{{ user_home }}/.rtorrent.rc"
      register: rtorrent_rc_stat

    - name: Backup bestaande .rtorrent.rc (Local copy)
      copy:
        src: "{{ user_home }}/.rtorrent.rc"
        dest: "{{ user_home }}/.rtorrent.rc.bak.{{ ansible_date_time.epoch | default('init') }}"
        remote_src: yes
        mode: '0600'
      when: rtorrent_rc_stat.stat.exists

    - name: Systeem limits optimaliseren
      become: yes
      copy:
        dest: "/etc/security/limits.d/rtorrent.conf"
        content: |
          {{ user_id }} soft nofile 16384
          {{ user_id }} hard nofile 32768
        mode: '0644'

    - name: Installeer software stack
      become: yes
      apt:
        name: [rtorrent, tmux, logrotate]
        state: present
        update_cache: yes
        cache_valid_time: 3600

    - name: Mappenstructuur inrichten
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ user_id }}"
        mode: '0700'
      loop:
        - "{{ base_dir }}"
        - "{{ base_dir }}/.session"
        - "{{ watch_dir }}"
        - "{{ download_dir }}"
        - "{{ user_home }}/.config/systemd/user"

    - name: Genereer .rtorrent.rc (v1.0.0)
      copy:
        dest: "{{ user_home }}/.rtorrent.rc"
        owner: "{{ user_id }}"
        mode: '0600'
        content: |
          # Directories
          directory.default.set = {{ download_dir }}
          session.path.set = {{ base_dir }}/.session
          
          # Watch Directory
          schedule2 = watch_directory,5,5,"load.start={{ watch_dir }}/*.torrent"
          
          # Smart Network Watchdog (stops active downloads on net-loss)
          schedule2 = network_check,300,60,"if=(equal=(network.is_online),no), (d.stop=*), (d.close=*)"
          
          # Network & Ports
          port_range.set = 49164-49184
          port_random.set = 1
          check_hash.set = yes
          
          # Performance & Logging
          pieces.memory_max.set = 512M
          log.open_file = "rtorrent", {{ base_dir }}/rtorrent.log
          log.add_output = "info", "rtorrent"

    - name: Systemd User Service configureren
      copy:
        dest: "{{ user_home }}/.config/systemd/user/rtorrent.service"
        content: |
          [Unit]
          Description=rTorrent Enterprise Daemon
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          LimitNOFILE=32768
          ExecStartPre=-/usr/bin/tmux kill-session -t rtorrent
          ExecStart=/usr/bin/tmux new-session -d -s rtorrent /usr/bin/rtorrent
          ExecStop=-/usr/bin/tmux send-keys -t rtorrent C-q Enter
          WorkingDirectory=%h
          KillMode=control-group
          TimeoutStopSec=30
          Restart=on-failure

          [Install]
          WantedBy=default.target

    - name: Logrotate configureren
      become: yes
      copy:
        dest: /etc/logrotate.d/rtorrent
        content: |
          {{ base_dir }}/rtorrent.log {
            daily
            rotate 7
            compress
            missingok
            notifempty
            create 0600 {{ user_id }} {{ user_id }}
          }

    - name: Enable Linger (Persistentie)
      become: yes
      shell: |
        if [ "$(loginctl show-user {{ user_id }} -p Linger --value)" = "no" ]; then
          loginctl enable-linger {{ user_id }}
          echo "changed"
        fi
      register: linger_result
      changed_when: "'changed' in linger_result.stdout"

    - name: Service Reload & Start
      systemd:
        name: rtorrent
        enabled: yes
        state: restarted
        scope: user
        daemon_reload: yes

    - name: Deep Healthcheck (UI Verification)
      shell: tmux capture-pane -t rtorrent -p | grep -qi "rtorrent"
      register: health_check
      until: health_check.rc == 0
      retries: 5
      delay: 2
      changed_when: false
      failed_when: health_check.rc != 0 and health_check.attempts == 5
