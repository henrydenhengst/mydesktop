---
# =============================================================================
# Enterprise rTorrent Deployment - v2.1.0 (tmux edition)
# =============================================================================
# 
# FEATURES
# --------
# 
# ✅ MODERN TERMINAL MULTIPLEXER
#    • Gebruikt tmux i.p.v. verouderde screen
#    • Betere scripting mogelijkheden
#    • Actieve ontwikkeling en community support
#    • Uitgebreide configuratie opties
#
# ✅ SYSTEEM OPTIMALISATIE
#    • Verhoogde file limits (65536 bestanden)
#    • Verhoogde process limits (32768 processen)
#    • PAM limits module automatisch ingeschakeld
#    • Geoptimaliseerd voor vele gelijktijdige torrents
#
# ✅ PERSISTENTE SERVICE
#    • Systemd user service (draait na logout)
#    • Automatic restart on failure
#    • Reload ondersteuning via tmux send-keys
#    • Linger ingeschakeld voor gebruiker
#
# ✅ DIRECTORY STRUCTUUR
#    • Gestructureerde mappen voor sessies, downloads en logs
#    • Watch directories met processed backup
#    • Automatische logrotatie (7 dagen retentie)
#    • Juiste permissies en ownership
#
# ✅ ROBUUSTE CONFIGURATIE
#    • Optimale poort range (6881-6999)
#    • DHT en PEX ondersteuning
#    • Encryption instellingen
#    • Bandbreedte en connectie limits
#    • Uitgebreide logging
#
# ✅ HEALTHCHECK (STIL)
#    • Geen valse "FAILED" meldingen tijdens opstart
#    • Alleen output bij echte problemen
#    • 60 seconden timeout voor opstarten
#    • Automatische HTTP verificatie
#
# ✅ FOUTAFHANDELING
#    • Duidelijke foutmeldingen met diagnose commando's
#    • Automatic recovery na crashes
#    • Backup van bestaande configuraties
#    • Graceful shutdown via tmux send-keys
#
# ✅ COMPATIBILITEIT
#    • Debian 13 (Trixie) geoptimaliseerd
#    • Werkt met ruTorrent, Flood, of andere Web UI's
#    • Poort 8080 (standaard voor meeste Web UI's)
#    • UTF-8 encoding ondersteuning
#
# =============================================================================
# 
# Dit playbook installeert en configureert rTorrent op Debian 13 (Trixie)
# met tmux als terminal multiplexer (modern alternatief voor screen).
#
# Geschikt voor:
#   - Seedboxes (private trackers)
#   - Homelab torrent servers
#   - Geautomatiseerde download omgevingen
#   - Media server integraties (Radarr, Sonarr, etc.)
#   - Headless servers (geen GUI nodig)
#
# Vereisten:
#   - Debian 13 (Trixie) of compatibel
#   - sudo rechten
#   - Internet verbinding
#   - Poort 8080 vrij (voor Web UI)
#
# Gebruik:
#   ansible-playbook -K rtorrent.yml
#
# NA INSTALLATIE:
#   -------------
#   1. Web UI: http://localhost:8080 (indien geïnstalleerd)
#   2. Console: tmux attach -t rtorrent
#   3. Status: systemctl --user status rtorrent
#   4. Logs: journalctl --user -u rtorrent -f
#
# =============================================================================

- name: Enterprise rTorrent Deployment - v2.1.0 (tmux edition)
  hosts: localhost
  become: true
  gather_facts: true

  vars:
    # Gebruiker configuratie
    target_user: "{{ ansible_user_id }}"
    user_home: "/home/{{ target_user }}"
    
    # rTorrent directories
    rtorrent_base: "{{ user_home }}/rtorrent"
    rtorrent_session: "{{ rtorrent_base }}/.session"
    rtorrent_watch: "{{ rtorrent_base }}/watch"
    rtorrent_processed: "{{ rtorrent_base }}/watch/processed"
    rtorrent_downloading: "{{ rtorrent_base }}/downloading"
    rtorrent_logs: "{{ rtorrent_base }}/logs"
    
    # tmux session name
    tmux_session: "rtorrent"
    
    # Systeem limits (geoptimaliseerd voor vele torrents)
    limits_conf: |
      {{ target_user }} soft nofile 65536
      {{ target_user }} hard nofile 65536
      {{ target_user }} soft nproc 32768
      {{ target_user }} hard nproc 32768
    
    # .rtorrent.rc configuratie (v2.1.0 - geoptimaliseerd)
    rtorrent_rc_content: |
      # ============================================================
      # rTorrent Configuration - v2.1.0 (tmux edition)
      # ============================================================
      # Aanpassingen: Wijzig directory paden indien nodig
      # ============================================================
      
      # ---------- Directory instellingen ----------
      directory = {{ rtorrent_downloading }}
      session = {{ rtorrent_session }}
      
      # ---------- Watch directories ----------
      schedule = watch_directory,5,5,"load_start={{ rtorrent_watch }}/*.torrent"
      schedule = watch_directory_processed,10,10,"load_start={{ rtorrent_processed }}/*.torrent"
      
      # ---------- Netwerk instellingen ----------
      port_range = 6881-6999
      port_random = yes
      peer_exchange = yes
      dht = auto
      dht_port = 6881
      
      # ---------- Bandbreedte limits (0 = unlimited) ----------
      upload_rate = 0
      download_rate = 0
      
      # ---------- Maximale connecties ----------
      max_uploads = 50
      max_uploads_global = 200
      max_downloads_global = 100
      
      # ---------- Protocol instellingen ----------
      protocol.encryption.set = allow_incoming,enable_retry,prefer_plaintext
      protocol.pex.set = yes
      
      # ---------- Performance optimalisatie ----------
      pieces.hash.on_complete = no
      trackers.numwant.set = 80
      execute.nothrow = sh,-c,"ulimit -n 65536"
      
      # ---------- Logging ----------
      log.execute = {{ rtorrent_logs }}/execute.log
      log.tracker = {{ rtorrent_logs }}/tracker.log
      log.rtorrent = {{ rtorrent_logs }}/rtorrent.log
      
      # ---------- UI instellingen (voor tmux) ----------
      ui.tracker.show_pex = yes
      ui.tracker.show_upnp = yes
      ui.tracker.show_dht = yes
      encoding.plugin.set = utf8
      encoding.add = utf8
      
      # ---------- Auto opschonen ----------
      schedule = session_save,240,3600,session_save
      schedule = low_diskspace,0,30,"close_low_diskspace=100M"
      
      # ---------- Throttle instellingen ----------
      throttle.max_uploads.global.set = 200
      throttle.max_uploads.set = 50
      throttle.min_peers.normal.set = 20
      throttle.max_peers.normal.set = 100
      throttle.min_peers.seed.set = 10
      throttle.max_peers.seed.set = 50
      
      # ============================================================
      # End of Configuration
      # ============================================================
    
    # Systemd user service met tmux
    systemd_service_content: |
      [Unit]
      Description=rTorrent Client (tmux)
      After=network.target
      Wants=network.target
      
      [Service]
      Type=forking
      KillMode=process
      ExecStart=/usr/bin/tmux new-session -d -s {{ tmux_session }} '/usr/bin/rtorrent'
      ExecStop=/usr/bin/tmux send-keys -t {{ tmux_session }} C-q
      ExecReload=/usr/bin/tmux send-keys -t {{ tmux_session }} C-r
      WorkingDirectory={{ rtorrent_base }}
      User={{ target_user }}
      Restart=on-failure
      RestartSec=10
      LimitNOFILE=65536
      LimitNPROC=32768
      
      [Install]
      WantedBy=default.target
    
    # tmux configuratie (verbeterde UI)
    tmux_conf_content: |
      # ============================================================
      # tmux configuration for rTorrent - v2.1.0
      # ============================================================
      
      # Terminal instellingen
      set -g default-terminal "screen-256color"
      set -g history-limit 10000
      
      # Status bar
      set -g status-bg black
      set -g status-fg white
      set -g status-left "#[fg=green]⚡ rTorrent#[default]"
      set -g status-right "#[fg=yellow]%H:%M#[default] | #[fg=cyan]%d-%b#[default]"
      
      # Key bindings voor rTorrent
      bind r send-keys C-r          # Reload configuratie
      bind q confirm-before "kill-session -t rtorrent"  # Exit sessie
      
      # Mouse ondersteuning
      set -g mouse on
      
      # Scroll mode verbeteringen
      set -g mode-keys vi
      
      # ============================================================
    
    # Logrotate configuratie (7 dagen retentie)
    logrotate_content: |
      {{ rtorrent_logs }}/*.log {
          daily
          rotate 7
          compress
          delaycompress
          missingok
          notifempty
          create 644 {{ target_user }} {{ target_user }}
          sharedscripts
          postrotate
              systemctl --user restart rtorrent > /dev/null 2>&1 || true
          endscript
      }

  pre_tasks:
    - name: Check if running on Debian
      fail:
        msg: "Dit playbook werkt alleen op Debian"
      when: ansible_os_family != "Debian"

    - name: Show deployment start
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════╗
          ║     🚀 rTorrent Deployment v2.1.0 (tmux edition)                  ║
          ╠═══════════════════════════════════════════════════════════════════╣
          ║     📍 User: {{ target_user }}                                    ║
          ║     📁 Base: {{ rtorrent_base }}                                  ║
          ║     🖥️  Terminal: tmux (modern)                                   ║
          ║     📡 Web UI: http://localhost:8080 (indien geïnstalleerd)       ║
          ╚═══════════════════════════════════════════════════════════════════╝
          ====================================

  tasks:
    # ========================================================================
    # SYSTEEM OPTIMALISATIE
    # ========================================================================
    
    - name: Systeem limits optimaliseren (meer bestanden/procesjes)
      lineinfile:
        path: /etc/security/limits.conf
        line: "{{ item }}"
        create: yes
        mode: '0644'
      loop: "{{ limits_conf.split('\n') }}"
      when: limits_conf.split('\n') | length > 0
      register: limits_updated

    - name: PAM limits module inschakelen (indien nodig)
      lineinfile:
        path: /etc/pam.d/common-session
        line: "session required pam_limits.so"
        insertafter: EOF
      when: limits_updated.changed

    # ========================================================================
    # SOFTWARE INSTALLATIE
    # ========================================================================
    
    - name: Installeer software stack (tmux ipv screen)
      apt:
        name:
          - rtorrent
          - tmux                    # Moderne terminal multiplexer
          - curl
          - htop                    # Proces monitor
          - ncdu                    # Schijfruimte analyzer
          - nload                   # Netwerk monitor
          - mediainfo               # Media bestand info
          - unrar                   # RAR extractie
          - unzip                   # ZIP extractie
          - p7zip-full              # 7z extractie
          - bc                      # Rekenkundige bewerkingen
          - logrotate               # Log rotatie
        state: present
        update_cache: yes
        cache_valid_time: 3600

    # ========================================================================
    # DIRECTORY STRUCTUUR
    # ========================================================================
    
    - name: Mappenstructuur inrichten (geoptimaliseerd)
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'
      loop:
        - "{{ rtorrent_base }}"
        - "{{ rtorrent_session }}"
        - "{{ rtorrent_watch }}"
        - "{{ rtorrent_processed }}"
        - "{{ rtorrent_downloading }}"
        - "{{ rtorrent_logs }}"
        - "{{ user_home }}/.config/systemd/user"
        - "{{ user_home }}/.tmux"   # tmux configuratie directory

    # ========================================================================
    # CONFIGURATIE BESTANDEN
    # ========================================================================
    
    - name: Backup bestaande .rtorrent.rc (indien aanwezig)
      copy:
        src: "{{ user_home }}/.rtorrent.rc"
        dest: "{{ user_home }}/.rtorrent.rc.backup.{{ ansible_date_time.epoch }}"
        remote_src: yes
        mode: '0644'
      ignore_errors: yes
      when: ansible_date_time is defined

    - name: Genereer .rtorrent.rc (v2.1.0 met tmux support)
      copy:
        content: "{{ rtorrent_rc_content }}"
        dest: "{{ user_home }}/.rtorrent.rc"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'
      notify: reload_rtorrent

    - name: tmux configuratie (verbeterde UI)
      copy:
        content: "{{ tmux_conf_content }}"
        dest: "{{ user_home }}/.tmux.conf"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'
      ignore_errors: yes

    - name: Systemd User Service configureren (tmux based)
      copy:
        content: "{{ systemd_service_content }}"
        dest: "{{ user_home }}/.config/systemd/user/rtorrent.service"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'
      register: systemd_service

    - name: Logrotate configureren (7 dagen retentie)
      copy:
        content: "{{ logrotate_content }}"
        dest: /etc/logrotate.d/rtorrent
        owner: root
        group: root
        mode: '0644'
      register: logrotate_config

    # ========================================================================
    # SERVICE PERSISTENTIE
    # ========================================================================
    
    - name: Enable Linger voor user (service blijft draaien na logout)
      command: "loginctl enable-linger {{ target_user }}"
      changed_when: false
      become: true

    # ========================================================================
    # SERVICE START
    # ========================================================================
    
    - name: Systemd daemon reload (user)
      command: "systemctl --user daemon-reload"
      become: true
      become_user: "{{ target_user }}"
      changed_when: false
      when: systemd_service.changed

    - name: Start rTorrent service (tmux session)
      systemd:
        name: rtorrent
        state: started
        enabled: yes
        scope: user
      become: true
      become_user: "{{ target_user }}"
      register: service_start

    - name: Wacht op service initialisatie
      pause:
        seconds: 3
      when: service_start.changed

    - name: Check of tmux session actief is
      command: "tmux has-session -t {{ tmux_session }}"
      become: true
      become_user: "{{ target_user }}"
      register: tmux_check
      failed_when: false
      changed_when: false

    # ========================================================================
    # HEALTHCHECK (STIL - ALLEEN OUTPUT BIJ PROBLEMEN)
    # ========================================================================
    
    - name: Healthcheck - wacht op rTorrent (stil)
      wait_for:
        port: 8080
        host: localhost
        timeout: 60
        delay: 5
      register: _wait_result
      failed_when: false
      changed_when: false
      ignore_errors: true

    - name: Healthcheck - UI verificatie (stil)
      uri:
        url: http://localhost:8080
        status_code: 200
        timeout: 10
      register: _ui_result
      failed_when: false
      changed_when: false
      when: _wait_result is successful
      ignore_errors: true

    - name: ⚠️ DEPLOYMENT MISLUKT - Alleen bij echte problemen
      fail:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════╗
          ║                    ❌ DEPLOYMENT FAILED                            ║
          ╚═══════════════════════════════════════════════════════════════════╝
          
          Probleem: {% if _wait_result is failed %}Poort 8080 niet bereikbaar{% else %}UI reageert niet op HTTP{% endif %}
          
          🔧 Diagnose commando's:
             • systemctl --user status rtorrent
             • tmux attach -t {{ tmux_session }}
             • journalctl --user -u rtorrent -n 50
             • ss -tuln | grep 8080
             • cat {{ rtorrent_logs }}/rtorrent.log
          
          💡 Veelgestelde oplossingen:
             • Wacht langer (soms 60+ seconden nodig)
             • Check firewall: sudo ufw status
             • Herstart service: systemctl --user restart rtorrent
          ========================================
      when: 
        - _wait_result is failed or (_ui_result is defined and _ui_result.status is not defined) or (_ui_result is defined and _ui_result.status != 200)

  handlers:
    - name: reload_rtorrent
      systemd:
        name: rtorrent
        state: restarted
        scope: user
        daemon_reload: yes
      become: true
      become_user: "{{ target_user }}"

  post_tasks:
    - name: Deployment succesvol - Toon samenvatting
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════╗
          ║              ✅ rTorrent DEPLOYMENT SUCCESSFUL                    ║
          ║                      (tmux edition)                               ║
          ╚═══════════════════════════════════════════════════════════════════╝
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 📦 GEÏNSTALLEERDE COMPONENTEN                                    │
          ├─────────────────────────────────────────────────────────────────┤
          │  • rTorrent + tmux (modern)                                     │
          │  • Systemd user service (persistent)                            │
          │  • Logrotate (7 dagen retentie)                                 │
          │  • Monitoring tools (htop, nload, ncdu)                         │
          └─────────────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 📁 DIRECTORY STRUCTUUR                                          │
          ├─────────────────────────────────────────────────────────────────┤
          │  ├── {{ rtorrent_base }}                                        │
          │  │   ├── .session/     (sessie data)                            │
          │  │   ├── watch/        (nieuwe torrents)                        │
          │  │   │   └── processed/(backup verwerkte torrents)              │
          │  │   ├── downloading/  (download locatie)                       │
          │  │   └── logs/         (log bestanden)                          │
          └─────────────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 🔧 BEHEER COMMANDO'S                                            │
          ├─────────────────────────────────────────────────────────────────┤
          │  • Status:      systemctl --user status rtorrent                │
          │  • Start:       systemctl --user start rtorrent                 │
          │  • Stop:        systemctl --user stop rtorrent                  │
          │  • Logs:        journalctl --user -u rtorrent -f                │
          │  • Console:     tmux attach -t {{ tmux_session }}               │
          │  • Detach:      Ctrl+B, D                                       │
          │  • Reload config: systemctl --user restart rtorrent             │
          └─────────────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 🖥️  TMUX SNELTOETSEN                                            │
          ├─────────────────────────────────────────────────────────────────┤
          │  • Ctrl+B, [      → Scroll modus (q om te stoppen)              │
          │  • Ctrl+B, D      → Detach (blijft draaien)                     │
          │  • Ctrl+B, ?      → Help (alle sneltoetsen)                     │
          │  • Ctrl+B, r      → Reload configuratie (binnen tmux)           │
          └─────────────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 📡 WEB UI (indien geïnstalleerd)                                │
          ├─────────────────────────────────────────────────────────────────┤
          │  • http://localhost:8080                                        │
          │  • http://{{ ansible_default_ipv4.address }}:8080               │
          └─────────────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 📝 CONFIGURATIE BESTANDEN                                       │
          ├─────────────────────────────────────────────────────────────────┤
          │  • Main config:     {{ user_home }}/.rtorrent.rc                │
          │  • tmux config:     {{ user_home }}/.tmux.conf                  │
          │  • Systemd service: {{ user_home }}/.config/systemd/user/rtorrent.service │
          │  • Logrotate:       /etc/logrotate.d/rtorrent                   │
          └─────────────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 💡 TIPS                                                         │
          ├─────────────────────────────────────────────────────────────────┤
          │  • Config aanpassen → systemctl --user restart rtorrent         │
          │  • Nieuwe torrents → plaats in {{ rtorrent_watch }}/            │
          │  • tmux sessie herstellen → tmux attach -t {{ tmux_session }}   │
          │  • Meer info → man rtorrent, man tmux                           │
          └─────────────────────────────────────────────────────────────────┘
          
          ╔═══════════════════════════════════════════════════════════════════╗
          ║                    🎉 READY FOR USE! 🎉                            ║
          ╚═══════════════════════════════════════════════════════════════════╝
      when: 
        - _wait_result is successful
        - _ui_result is defined
        - _ui_result.status == 200

    - name: tmux sessie info (alternatief als UI niet werkt)
      debug:
        msg: |
          ╔═══════════════════════════════════════════════════════════════════╗
          ║         ✅ rTorrent SERVICE DRAALT - Gebruik tmux console         ║
          ╚═══════════════════════════════════════════════════════════════════╝
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 📟 VERBINDEN MET rTORRENT CONSOLE                                │
          ├─────────────────────────────────────────────────────────────────┤
          │  • tmux attach -t {{ tmux_session }}                            │
          └─────────────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 🚪 DETACHEN (blijft draaien op achtergrond)                     │
          ├─────────────────────────────────────────────────────────────────┤
          │  • Ctrl+B, D                                                    │
          └─────────────────────────────────────────────────────────────────┘
          
          ┌─────────────────────────────────────────────────────────────────┐
          │ 📊 STATUS                                                        │
          ├─────────────────────────────────────────────────────────────────┤
          │  • tmux sessie: {% if tmux_check.rc == 0 %}✅ ACTIEF{% else %}❌ NIET ACTIEF{% endif %}     │
          │  • rTorrent service: actief                                     │
          │  • Web UI: niet bereikbaar (optioneel)                          │
          └─────────────────────────────────────────────────────────────────┘
          
          🔧 Als tmux sessie niet actief is:
             systemctl --user restart rtorrent
      when:
        - _wait_result is successful
        - _ui_result is defined
        - _ui_result.status != 200
      ignore_errors: yes

# =============================================================================
# END OF PLAYBOOK - tmux edition v2.1.0
# =============================================================================