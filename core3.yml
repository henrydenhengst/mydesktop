---
- name: Systeemoptimalisatie voor Windows-gebruikers
  hosts: localhost
  connection: local
  become: no

  tasks:
    - name: Voeg non-free en contrib repositories toe
      become: yes
      apt_repository:
        repo: "deb http://deb.debian.org/debian/ {{ ansible_distribution_release }} main contrib non-free non-free-firmware"
        state: present

    - name: Installeer ontbrekende 'Windows' essentials
      become: yes
      apt:
        name:
          - hplip
          - cups
          - avahi-daemon
          - libavcodec-extra
          - gnome-system-monitor
          - htop
          - p7zip-full
          - unrar-free
        state: present
        update_cache: yes

    - name: Configureer de Windows-stijl Taakbeheer shortcut
      shell: |
        # Ontkoppel de standaard Log Out actie
        gsettings set org.cinnamon.desktop.keybindings.media-keys logout "['']" || true
        
        # Maak pad voor custom keybinding
        KEYPATH="/org/cinnamon/desktop/keybindings/custom-keybindings/custom0/"
        
        # Stel de shortcut in
        gsettings set org.cinnamon.desktop.keybindings.custom-keybinding:$KEYPATH name 'Task Manager'
        gsettings set org.cinnamon.desktop.keybindings.custom-keybinding:$KEYPATH command 'gnome-system-monitor'
        gsettings set org.cinnamon.desktop.keybindings.custom-keybinding:$KEYPATH binding "['<Control><Alt>Delete']"
        
        # Activeer de lijst
        gsettings set org.cinnamon.desktop.keybindings custom-list "['custom0']"
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Toon voltooiingsbericht
      debug:
        msg: "Transformatie Voltooid! De Nachtlamp-fout is verwijderd. Herstart de laptop voor resultaat."
