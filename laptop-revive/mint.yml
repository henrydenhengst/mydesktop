#!/bin/bash

OUTPUT="hardware-info.txt"
exec > "$OUTPUT" 2>&1

# Controleer of het script met sudo wordt uitgevoerd
if [ "$EUID" -ne 0 ]; then 
  echo "Fout: Voer dit script uit met sudo (bijv. sudo ./hardware_info.sh)"
  exit 1
fi

# Check en installeer dmidecode indien nodig
if ! command -v dmidecode &> /dev/null; then
  echo "dmidecode niet gevonden. Installeren..."
  apt update
  apt install -y dmidecode

  if ! command -v dmidecode &> /dev/null; then
    echo "Installatie van dmidecode is mislukt."
    exit 1
  fi
fi

# Hostname en datum/tijd
HOSTNAME=$(hostname)
DATUM=$(date "+%Y-%m-%d %H:%M:%S")

echo "------------------------------------------"


