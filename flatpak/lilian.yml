---
- name: Volledige Flatpak en Audio Configuratie (Debian)
  hosts: all
  become: true
  vars:
    # De 4 specifieke applicaties uit je verzoek
    flatpak_apps:
      - us.zoom.Zoom
      - com.google.Chrome
      - org.onlyoffice.desktopeditors
      - com.github.IsmaelMartinez.teams_for_linux

  tasks:
    - name: Update apt cache en installeer Flatpak + PipeWire componenten
      ansible.builtin.apt:
        name:
          - flatpak
          - xdg-desktop-portal-gtk
          - pipewire-audio-client-libraries
          - pipewire-pulse
          - wireplumber
        state: present
        update_cache: yes

    - name: Voeg de Flathub repository toe
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Installeer de 4 Flatpak applicaties
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps }}"

    - name: Configureer globale permissies (Hardware, Homedrive, Audio)
      # Dit zorgt dat de 4 apps (en toekomstige apps) overal bij kunnen
      ansible.builtin.command: >
        flatpak override --global
        --filesystem=home
        --device=all
        --socket=wayland
        --socket=x11
        --socket=pulseaudio
      changed_when: false

    - name: Controleer of de PipeWire services geactiveerd zijn (User Level)
      # Noodzakelijk voor correct geluid in de 4 apps
      ansible.builtin.systemd:
        name: "{{ item }}"
        scope: user
        enabled: yes
        state: started
      loop:
        - pipewire
        - pipewire-pulse
        - wireplumber
      become: false 

    - name: Forceer update van appstream informatie
      ansible.builtin.command: flatpak update --appstream
      changed_when: false
