---
- name: Volledige Flatpak configuratie voor Debian
  hosts: all
  become: true
  vars:
    flatpak_apps:
      - us.zoom.Zoom
      - com.google.Chrome
      - org.onlyoffice.desktopeditors
      - com.github.IsmaelMartinez.teams_for_linux

  tasks:
    - name: Installeer Flatpak en Desktop Portals
      ansible.builtin.apt:
        name: 
          - flatpak
          - xdg-desktop-portal-gtk  # Nodig voor correcte integratie in Debian
        state: present
        update_cache: yes

    - name: Voeg Flathub repository toe
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Installeer de applicaties
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        remote: flathub
      loop: "{{ flatpak_apps }}"

    - name: Stel globale rechten in voor alle Flatpaks
      # Dit stelt de rechten in voor alle apps tegelijk (--global)
      # --filesystem=home: Toegang tot de gehele homedrive
      # --device=all: Toegang tot GPU, Webcams en andere hardware
      # --socket=pulseaudio: Essentieel voor geluid in Zoom/Teams
      ansible.builtin.command: >
        flatpak override --global 
        --filesystem=home 
        --device=all 
        --socket=wayland 
        --socket=x11 
        --socket=pulseaudio
      changed_when: false

    - name: Zorg dat de wijzigingen direct effectief zijn
      ansible.builtin.command: flatpak update --appstream
      changed_when: false
