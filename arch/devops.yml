devops_post_install:
  description: "Arch Linux DevOps post-install configuration with KDE look & feel"
  target_user: "${SUDO_USER:-$USER}"
  prerequisites:
    - sudo
    - internet_connection
  system_update:
    pacman:
      command: "Syu"
      options: "--noconfirm"
  packages:
    devops_tools:
      pacman:
        - ripgrep
        - fd
        - jq
        - yq
        - eza
        - bat
        - duf
        - ncdu
        - tree
        - curl
        - wget
        - nmap
        - dnsutils
        - mtr
        - tcpdump
        - netcat
        - btop
        - htop
        - iotop
        - iftop
        - strace
        - lsof
        - git
        - git-delta
        - lazygit
        - tig
        - github-cli
        - ansible
        - ansible-lint
        - yamllint
        - python-pip
        - docker
        - docker-compose
        - podman
        - buildah
        - skopeo
        - kubectl
        - helm
        - rsync
        - unzip
        - zip
        - xz
        - shellcheck
        - shfmt
        - fzf
        - tmux
        - neovim
        - direnv
        - tldr
        - hyperfine
        - entr
        - parallel
  services:
    enabled_now:
      - docker
      - systemd-timesyncd
  permissions:
    docker_group:
      add_user: true
      user: "${SUDO_USER:-$USER}"
  python_tools:
    pip_install_user:
      - molecule
  shell_config:
    bashrc_path: "/home/${SUDO_USER:-$USER}/.bashrc"
    aliases:
      ls: "eza --icons --group-directories-first"
      ll: "eza -l --icons --group-directories-first"
      la: "eza -la --icons --group-directories-first"
      cat: "bat"
      df: "duf"
      top: "btop"
      gs: "git status"
      ga: "git add"
      gc: "git commit"
      gp: "git push"
      gl: "git pull"
    fzf:
      key_bindings: "/usr/share/fzf/key-bindings.bash"
    direnv:
      hook: "eval \"$(direnv hook bash)\""
  kde_look_and_feel:
    global_theme: "Breeze Dark"
    icons: "Papirus-Dark"
    cursor_theme: "Breeze_Snow"
    fonts:
      system: "Noto Sans"
      terminal: "JetBrains Mono Nerd Font 11pt"
    panel:
      position: "bottom"
      auto_hide: true
      task_manager: "grouped icons only"
    widgets:
      - clock_calendar
      - system_monitor
      - quick_launcher
    compositor:
      tearing_prevention: "automatic"
      blur: "subtle"
      animations_speed: "medium"
    wayland: true
    shortcuts:
      krunner: "Alt+Space"
      terminal: "Ctrl+Alt+T"
      lock_screen: "Ctrl+Alt+L"
      screenshot: "Print"